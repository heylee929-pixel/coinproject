<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Jam | Real-time Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0d1117; color: #f0f6fc; overflow-x: hidden; }
        .tv-chart-container { height: 450px; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0d1117; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
        
        /* Layout Configuration (35% | 50% | 15%) */
        .jam-grid-container {
            display: grid;
            grid-template-columns: 35% 50% 15%;
            gap: 1.5rem;
            max-width: 1600px;
            margin: 0 auto;
            padding: 1.5rem 1rem;
        }
        @media (max-width: 1024px) {
            .jam-grid-container { grid-template-columns: 1fr; }
        }

        /* JAM 포인트 컬러 및 효과 */
        .jam-accent { color: #FF007A; text-shadow: 0 0 15px rgba(255, 0, 122, 0.4); }
        .jam-bg { background-color: #FF007A; }
        .tab-active { color: #FF007A; background-color: #1c2128; box-shadow: inset 0 -2px 0 #FF007A; }
        
        /* 수익/손실 네온 효과 */
        .profit-glow { color: #00d1ff !important; text-shadow: 0 0 10px rgba(0, 209, 255, 0.6); font-weight: 800; }
        .loss-glow { color: #ff4d4d !important; text-shadow: 0 0 10px rgba(255, 77, 77, 0.6); font-weight: 800; }
        
        /* 실시간 시세 변동 플래시 효과 */
        .price-up { color: #00ffa2 !important; transition: all 0.2s; }
        .price-down { color: #ff007a !important; transition: all 0.2s; }
        
        @keyframes jam-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .jam-loading { animation: jam-pulse 1.5s infinite; }

        /* CRYPTO HUB 버튼 스타일 */
        .hub-btn { 
            background-color: #161b22; 
            border: 1px solid #30363d; 
            color: #ffffff; 
            transition: all 0.2s ease; 
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 100%;
        }
        .hub-btn:hover { 
            border-color: #FF007A; 
            color: #FF007A; 
            box-shadow: 0 0 15px rgba(255, 0, 122, 0.3);
            background-color: #1c2128;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <!-- ==========================================
         [1] TOP TICKER SECTION
         ========================================== -->
    <div class="w-full border-b border-gray-800 bg-[#0d1117]">
        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
        {
            "symbols": [
                {"proName": "BINANCE:BTCUSDT", "title": "BTC"},
                {"proName": "BINANCE:ETHUSDT", "title": "ETH"},
                {"proName": "BINANCE:SOLUSDT", "title": "SOL"},
                {"proName": "BINANCE:XRPUSDT", "title": "XRP"},
                {"proName": "BINANCE:DOGEUSDT", "title": "DOGE"},
                {"proName": "BINANCE:ADAUSDT", "title": "ADA"},
                {"proName": "BINANCE:LINKUSDT", "title": "LINK"}
            ],
            "showSymbolLogo": true,
            "colorTheme": "dark",
            "isTransparent": true,
            "displayMode": "adaptive",
            "locale": "ko"
        }
        </script>
    </div>

    <!-- ==========================================
         [2] HEADER SECTION
         ========================================== -->
    <header class="border-b border-gray-800 bg-[#0d1117]/90 backdrop-blur-md sticky top-0 z-50">

            <div class="flex items-center space-x-3">
                <div class="p-1.5 bg-pink-500/10 rounded-lg">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" class="jam-accent">
                        <path d="M6 8C6 6.89543 6.89543 6 8 6H16C17.1046 6 18 6.89543 18 8V18C18 20.2091 16.2091 22 14 22H10C7.79086 22 6 20.2091 6 18V8Z" fill="currentColor" fill-opacity="0.2" stroke="currentColor" stroke-width="2.5"/>
                    </svg>
                </div>
                <span class="text-2xl font-black tracking-tighter italic uppercase">CRYPTO <span class="jam-accent">JAM</span></span>
            </div>
            <div class="flex items-center space-x-2 text-[11px] text-gray-500 font-bold tracking-widest">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-[0_0_8px_#22c55e]"></span>
                <span>REAL-TIME ENGINE LIVE</span>
            </div>
        </div>
    </header>

    <!-- ==========================================
         [3] MAIN CONTENT
         ========================================== -->
    <main class="flex-grow w-full">

                            <button onclick="JamApp.switchExchange('binance')" id="extab-binance" class="flex-1 py-1.5 text-[10px] font-black rounded-md transition-all jam-bg text-white uppercase shadow-lg shadow-pink-500/20">Binance</button>
                        </div>
                    </div>

                    </div>

            </div>

            <!-- [B] Chart & Portfolio (Center - 50%) -->

                        <div class="flex items-center space-x-3">

                            </div>

                            </div>
                        </div>
                    </div>

                    <div class="p-5 grid grid-cols-1 md:grid-cols-4 gap-6">
                        <!-- Add Form -->
                        <div class="md:col-span-1 space-y-3 border-r border-gray-800 pr-6">
                            <div class="flex justify-between items-center mb-1">
                                <p class="text-[10px] font-black text-gray-500 uppercase tracking-wider">Add Asset</p>
                                <div class="flex bg-[#0d1117] rounded-md p-0.5 border border-gray-800">
                                    <button onclick="JamApp.setExchange('upbit')" id="ex-upbit" class="px-2 py-0.5 text-[8px] font-black rounded transition-all text-gray-500 hover:text-white uppercase">UPBIT</button>

                                </div>
                            </div>

                            </div>
                            
                            <div class="relative">
                                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-[10px] font-bold text-gray-500">#</span>
                                <input type="text" id="p-quantity" oninput="JamApp.utils.formatInput(this)" placeholder="Amount" class="w-full bg-[#0d1117] border border-gray-700 rounded-lg pl-7 pr-3 py-2.5 text-xs focus:outline-none focus:border-pink-500">

                    </div>
                </section>
            </div>

            <!-- [C] CRYPTO HUB (Right - 15%) -->
            <div>

                    <div class="p-4 border-b border-gray-800 bg-[#0d1117] flex justify-between items-center">
                        <h3 class="font-black text-[12px] uppercase tracking-[0.2em] jam-accent">HUB</h3>
                    </div>

                                BINANCE
                            </a>
                            <a href="https://www.okx.com" target="_blank" class="hub-btn py-2.5 rounded-xl text-[10px] font-black hover:scale-[1.02] transform transition-transform gap-2 px-3">
                                <img src="https://www.google.com/s2/favicons?domain=okx.com&sz=32" class="w-3.5 h-3.5" alt="">
                                OKX
                            </a>
                            <a href="https://coinmarketcap.com" target="_blank" class="hub-btn py-2.5 rounded-xl text-[10px] font-black hover:scale-[1.02] transform transition-transform gap-2 px-3">
                                <img src="https://www.google.com/s2/favicons?domain=coinmarketcap.com&sz=32" class="w-3.5 h-3.5" alt="">
                                CMC
                            </a>
                            <a href="https://coinness.com" target="_blank" class="hub-btn py-2.5 rounded-xl text-[10px] font-black hover:scale-[1.02] transform transition-transform gap-2 px-3">
                                <img src="https://www.google.com/s2/favicons?domain=coinness.com&sz=32" class="w-3.5 h-3.5" alt="">
                                COINNESS
                            </a>
                            <button onclick="JamApp.hub.addLink()" class="hub-btn py-2.5 rounded-xl text-[10px] font-black hover:scale-[1.02] transform transition-transform border-dashed border-gray-600 opacity-60 hover:opacity-100 hover:border-pink-500">
                                [+] ADD
                            </button>
                        </div>
                    </div>

                    <!-- Bottom Decoration -->
                    <div class="p-2 bg-[#0d1117]/50 border-t border-gray-800/50">
                        <p class="text-[7px] text-gray-600 font-mono tracking-tighter animate-pulse uppercase text-center">SYSTEM v2.0</p>
                    </div>
                </section>
            </div>

        </div>
    </main>

    <!-- ==========================================
         [4] FOOTER SECTION
         ========================================== -->
    <footer class="border-t border-gray-800 py-6 bg-[#0d1117]">
        <div class="max-w-[1600px] mx-auto px-4 text-center text-gray-600 text-[10px] font-bold tracking-[0.3em] uppercase">
            &copy; 2026 CRYPTO <span class="text-pink-600">JAM</span> TERMINAL.
        </div>
    </footer>

    <!-- ==========================================
         [5] SCRIPTS & LOGIC
         ========================================== -->
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        /**
         * JAM APP - Core Application Object (v2.0 Phase 2)
         */
        const JamApp = {
            // 업비트 상장 여부 추가
            cryptoList: [
                { symbol: "BINANCE:BTCUSDT", name: "Bitcoin", sub: "BTC", id: "bitcoin", category: "CRYPTO", upbit: true },
                { symbol: "BINANCE:ETHUSDT", name: "Ethereum", sub: "ETH", id: "ethereum", category: "CRYPTO", upbit: true },
                { symbol: "BINANCE:SOLUSDT", name: "Solana", sub: "SOL", id: "solana", category: "CRYPTO", upbit: true },
                { symbol: "BINANCE:BNBUSDT", name: "BNB", sub: "BNB", id: "binancecoin", category: "CRYPTO", upbit: false },
                { symbol: "BINANCE:XRPUSDT", name: "XRP", sub: "XRP", id: "ripple", category: "CRYPTO", upbit: true },
                { symbol: "BINANCE:ADAUSDT", name: "Cardano", sub: "ADA", id: "cardano", category: "CRYPTO", upbit: true },
                { symbol: "BINANCE:LINKUSDT", name: "Chainlink", sub: "LINK", id: "chainlink", category: "CRYPTO", upbit: true },
                { symbol: "BINANCE:UNIUSDT", name: "Uniswap", sub: "UNI", id: "uniswap", category: "CRYPTO", upbit: false },
                { symbol: "BINANCE:AAVEUSDT", name: "Aave", sub: "AAVE", id: "aave", category: "CRYPTO", upbit: true },
                { symbol: "BINANCE:DOGEUSDT", name: "Dogecoin", sub: "DOGE", id: "dogecoin", category: "CRYPTO", upbit: true },
                { symbol: "BINANCE:SHIBUSDT", name: "Shiba Inu", sub: "SHIB", id: "shiba-inu", category: "CRYPTO", upbit: true },
                { symbol: "BINANCE:PEPEUSDT", name: "Pepe", sub: "PEPE", id: "pepe", category: "CRYPTO", upbit: false },
                { symbol: "BINANCE:FLOKIUSDT", name: "Floki", sub: "FLOKI", id: "floki", category: "CRYPTO", upbit: false },
                
                // [COMMODITY]
                { symbol: "BINANCE:XAUUSDT", name: "Gold", sub: "XAU", id: "gold", category: "COMMODITY", upbit: false },
                { symbol: "BINANCE:XAGUSDT", name: "Silver", sub: "XAG", id: "silver", category: "COMMODITY", upbit: false },

                { symbol: "BINANCE:XPDUSDT", name: "Palladium", sub: "XPD", id: "palladium", category: "COMMODITY", upbit: false },
                { symbol: "BINANCE:COPPERUSDT", name: "Copper", sub: "COPPER", id: "copper", category: "COMMODITY", upbit: false },
                { symbol: "BINANCE:CLUSDT", name: "WTI Oil", sub: "CL", id: "wti-oil", category: "COMMODITY", upbit: false },
                { symbol: "BINANCE:BZUSDT", name: "Brent Oil", sub: "BZ", id: "brent-oil", category: "COMMODITY", upbit: false },
                { symbol: "BINANCE:NATGASUSDT", name: "Natural Gas", sub: "NATGAS", id: "natural-gas", category: "COMMODITY", upbit: false },
                
                // [STOCK / ETF]
                { symbol: "BINANCE:TSLAUSDT", name: "Tesla", sub: "TSLA", id: "tesla", category: "STOCK", upbit: false },
                { symbol: "BINANCE:AAPLUSDT", name: "Apple", sub: "AAPL", id: "apple", category: "STOCK", upbit: false },
                { symbol: "BINANCE:AMZNUSDT", name: "Amazon", sub: "AMZN", id: "amazon", category: "STOCK", upbit: false },
                { symbol: "BINANCE:NVDAUSDT", name: "Nvidia", sub: "NVDA", id: "nvidia", category: "STOCK", upbit: false },
                { symbol: "BINANCE:MSFTUSDT", name: "Microsoft", sub: "MSFT", id: "microsoft", category: "STOCK", upbit: false },
                { symbol: "BINANCE:GOOGLUSDT", name: "Alphabet", sub: "GOOGL", id: "alphabet", category: "STOCK", upbit: false },
                { symbol: "BINANCE:METAUSDT", name: "Meta", sub: "META", id: "meta", category: "STOCK", upbit: false },

                { symbol: "BINANCE:MSTRUSDT", name: "MicroStrategy", sub: "MSTR", id: "microstrategy", category: "STOCK", upbit: false },
                { symbol: "BINANCE:PLTRUSDT", name: "Palantir", sub: "PLTR", id: "palantir", category: "STOCK", upbit: false },
                { symbol: "BINANCE:INTCUSDT", name: "Intel", sub: "INTEL", id: "intel", category: "STOCK", upbit: false },
                { symbol: "BINANCE:TSMUSDT", name: "TSMC", sub: "TSM", id: "tsmc", category: "STOCK", upbit: false },
                { symbol: "BINANCE:MUUSDT", name: "Micron", sub: "MU", id: "micron", category: "STOCK", upbit: false },
                { symbol: "BINANCE:HOODUSDT", name: "Robinhood", sub: "HOOD", id: "robinhood", category: "STOCK", upbit: false },
                { symbol: "BINANCE:CRCLUSDT", name: "Circle", sub: "CRCL", id: "circle", category: "STOCK", upbit: false },
                { symbol: "BINANCE:PAYPUSDT", name: "PayPay", sub: "PAYP", id: "paypay", category: "STOCK", upbit: false },
                { symbol: "BINANCE:SPYUSDT", name: "S&P 500 ETF", sub: "SPY", id: "spy", category: "STOCK", upbit: false },
                { symbol: "BINANCE:QQQUSDT", name: "Nasdaq 100 ETF", sub: "QQQ", id: "qqq", category: "STOCK", upbit: false },
                { symbol: "BINANCE:EWYUSDT", name: "MSCI South Korea ETF", sub: "EWY", id: "msci-korea", category: "STOCK", upbit: false },
                { symbol: "BINANCE:EWJUSDT", name: "MSCI Japan ETF", sub: "EWJ", id: "msci-japan", category: "STOCK", upbit: false }
            ],

            state: {
                market: { 
                    current: "CRYPTO", 
                    activeSymbol: "BINANCE:BTCUSDT",
                    activeExchange: "binance" // upbit | binance
                },
                portfolio: {
                    slots: JSON.parse(localStorage.getItem('jam_data_v2')) || [[], [], []],
                    realtimePrices: { upbit: {}, binance: {} },
                    prevPrices: { upbit: {}, binance: {} },
                    editingIndex: null,
                    inputExchange: 'binance',
                    currentSlot: 0
                },
                hubLinks: JSON.parse(localStorage.getItem('jam_hub_links')) || [],
                system: { fixedRate: 1400, displayCurrency: 'USD' }
            },

            // [Initial Price Sync Engine]
            async syncInitialPrices() {
                try {
                    const response = await fetch('https://fapi.binance.com/fapi/v1/ticker/price');
                    const data = await response.json();
                    let updated = false;
                    data.forEach(t => {
                        const coin = this.cryptoList.find(c => c.symbol === `BINANCE:${t.symbol}`);
                        if (coin) {
                            const price = parseFloat(t.price);
                            if (price > 0) {
                                this.state.portfolio.realtimePrices.binance[coin.id] = price;
                                updated = true;
                            }
                        }
                    });
                    if (updated) {
                        this.renderMarketList();
                        this.updateRealtimeUI();
                    }
                } catch (e) {
                    console.error("Initial Price Sync Failed", e);
                }
            },

            // [Dual WebSocket Engines]
            ws: {
                binance: null,
                upbit: null,
                futures: null,

                init() {
                    this.initBinance();
                    this.initUpbit();
                    this.initFutures();
                },

                initBinance() {
                    if (this.binance) return;
                    this.binance = new WebSocket("wss://stream.binance.com:9443/ws/!miniTicker@arr");
                    this.binance.onmessage = (msg) => {
                        const data = JSON.parse(msg.data);
                        let updated = false;
                        data.forEach(t => {
                            const sub = t.s.replace('USDT', '');
                            const coin = JamApp.cryptoList.find(c => c.sub === sub && c.category === 'CRYPTO');
                            if (coin) {
                                const price = parseFloat(t.c);
                                JamApp.state.portfolio.prevPrices.binance[coin.id] = JamApp.state.portfolio.realtimePrices.binance[coin.id];
                                JamApp.state.portfolio.realtimePrices.binance[coin.id] = price;
                                updated = true;
                            }
                        });
                        if (updated) JamApp.updateRealtimeUI();
                    };
                    this.binance.onclose = () => { this.binance = null; setTimeout(() => this.initBinance(), 3000); };
                },

                initFutures() {
                    if (this.futures) return;
                    this.futures = new WebSocket("wss://fstream.binance.com/ws/!miniTicker@arr");
                    this.futures.onmessage = (msg) => {
                        const data = JSON.parse(msg.data);
                        let updated = false;
                        data.forEach(t => {
                            const coin = JamApp.cryptoList.find(c => c.symbol === `BINANCE:${t.s}`);
                            if (coin && (coin.category === 'COMMODITY' || coin.category === 'STOCK')) {
                                const price = parseFloat(t.c);
                                JamApp.state.portfolio.prevPrices.binance[coin.id] = JamApp.state.portfolio.realtimePrices.binance[coin.id];
                                JamApp.state.portfolio.realtimePrices.binance[coin.id] = price;
                                updated = true;
                            }
                        });
                        if (updated) JamApp.updateRealtimeUI();
                    };
                    this.futures.onclose = () => { this.futures = null; setTimeout(() => this.initFutures(), 3000); };
                },

                initUpbit() {
                    if (this.upbit) return;
                    this.upbit = new WebSocket("wss://api.upbit.com/websocket/v1");
                    this.upbit.onopen = () => {
                        const codes = JamApp.cryptoList.filter(c => c.upbit).map(c => `KRW-${c.sub}`);
                        this.upbit.send(JSON.stringify([{ ticket: "JAM-ENGINE" }, { type: "ticker", codes }]));
                    };
                    this.upbit.onmessage = async (msg) => {
                        const text = await msg.data.text();
                        const t = JSON.parse(text);
                        const sub = t.code.replace('KRW-', '');
                        const coin = JamApp.cryptoList.find(c => c.sub === sub);
                        if (coin) {
                            JamApp.state.portfolio.prevPrices.upbit[coin.id] = JamApp.state.portfolio.realtimePrices.upbit[coin.id];
                            JamApp.state.portfolio.realtimePrices.upbit[coin.id] = t.trade_price;
                            JamApp.updateRealtimeUI();
                        }
                    };
                    this.upbit.onclose = () => { this.upbit = null; setTimeout(() => this.initUpbit(), 3000); };
                }
            },

            // [Exchange Rate Bridge]
            async syncExchangeRate() {
                console.log(`💎 FIXED_EXCHANGE_RATE: 1 USD = ${this.state.system.fixedRate} KRW`);
            },

            // [Targeted UI Updater]
            updateRealtimeUI() {
                const slotIdx = this.state.portfolio.currentSlot || 0;
                const slotData = this.state.portfolio.slots[slotIdx];
                const fixedRate = this.state.system.fixedRate;
                const isDisplayKRW = this.state.system.displayCurrency === 'KRW';
                
                let totalValUSD = 0, totalCostUSD = 0;
                let totalValKRW = 0, totalCostKRW = 0;

                slotData.forEach((asset, idx) => {
                    const isUpbitAsset = asset.exchange === 'upbit';
                    const curPrice = isUpbitAsset ? this.state.portfolio.realtimePrices.upbit[asset.id] : this.state.portfolio.realtimePrices.binance[asset.id];
                    const symbol = isUpbitAsset ? '₩' : '$';

                    if (curPrice) {
                        const val = curPrice * asset.quantity;
                        const cost = asset.buyPrice * asset.quantity;
                        const profit = val - cost;
                        const profitPct = cost > 0 ? (profit / cost) * 100 : 0;
                        const profitClass = profit >= 0 ? 'profit-glow' : 'loss-glow';

                        if (isUpbitAsset) {
                            totalValKRW += val; totalCostKRW += cost;
                            totalValUSD += val / fixedRate; totalCostUSD += cost / fixedRate;
                        } else {
                            totalValUSD += val; totalCostUSD += cost;
                            totalValKRW += val * fixedRate; totalCostKRW += cost * fixedRate;
                        }

                        const valEl = document.getElementById(`val-val-${idx}`);
                        const profitEl = document.getElementById(`profit-val-${idx}`);
                        const pctEl = document.getElementById(`pct-val-${idx}`);

                        if (valEl) valEl.innerText = `${symbol}${this.utils.fmt(val, isUpbitAsset ? 'krw' : 'cur')}`;
                        if (profitEl) {
                            profitEl.innerText = `${profit >= 0 ? '+' : '-'}${symbol}${this.utils.fmt(Math.abs(profit), isUpbitAsset ? 'krw' : 'cur')}`;
                            profitEl.className = `text-[9px] font-bold ${profitClass}`;
                        }
                        if (pctEl) {
                            pctEl.innerText = `${profit >= 0 ? '+' : ''}${this.utils.fmt(profitPct, 'pct')}%`;
                            pctEl.className = `text-[12px] font-black ${profitClass}`;
                        }
                    }
                });

                const finalVal = isDisplayKRW ? totalValKRW : totalValUSD;
                const finalCost = isDisplayKRW ? totalCostKRW : totalCostUSD;
                const finalProfit = finalVal - finalCost;
                const finalSymbol = isDisplayKRW ? '₩' : '$';
                const totalROI = finalCost > 0 ? (finalProfit / finalCost) * 100 : 0;
                const totalProfitClass = finalProfit >= 0 ? 'profit-glow' : 'loss-glow';

                document.getElementById('total-balance').innerText = `${finalSymbol}${this.utils.fmt(finalVal, isDisplayKRW ? 'krw' : 'cur')}`;
                const roiEl = document.getElementById('total-roi');
                if (roiEl) {
                    roiEl.innerText = `${totalROI >= 0 ? '+' : ''}${this.utils.fmt(totalROI, 'pct')}%`;
                    const bgClass = totalROI >= 0 ? 'bg-blue-500/10' : 'bg-red-500/10';
                    roiEl.className = `text-[12px] font-black px-1.5 py-0.5 rounded ${bgClass} ${totalProfitClass}`;
                }
                const profitAmtEl = document.getElementById('total-profit-amt');
                if (profitAmtEl) {
                    profitAmtEl.innerText = `${finalProfit >= 0 ? '+' : '-'}${finalSymbol}${this.utils.fmt(Math.abs(finalProfit), isDisplayKRW ? 'krw' : 'cur')}`;
                    profitAmtEl.className = `text-lg font-black ${totalProfitClass}`;
                }
            },

            setDisplayCurrency(curr) {
                this.state.system.displayCurrency = curr;
                document.getElementById('cur-krw').className = `px-1.5 py-0.5 text-[7.5px] font-black rounded transition-all ${curr === 'KRW' ? 'jam-bg text-white' : 'text-gray-500 hover:text-white'} uppercase`;
                document.getElementById('cur-usd').className = `px-1.5 py-0.5 text-[7.5px] font-black rounded transition-all ${curr === 'USD' ? 'jam-bg text-white' : 'text-gray-500 hover:text-white'} uppercase`;
                this.updateRealtimeUI();
            },

            changeChartSymbol(symbol) {
                if (!symbol) return;
                
                // 지능형 심볼 추출 (괄호 및 이름 제거)
                let targetSymbol = symbol.split('(')[0].trim();
                
                // Binance TradFi 종목 (COMMODITY, STOCK) 판별 및 .P 접미사 강제 적용
                const isTradFi = this.cryptoList.some(c => 
                    (c.category === 'COMMODITY' || c.category === 'STOCK') && 
                    (targetSymbol.includes(c.sub) || targetSymbol === c.symbol)
                );

                if (targetSymbol.startsWith('BINANCE:') && isTradFi) {
                    if (!targetSymbol.endsWith('.P')) targetSymbol += '.P';
                    console.log(`%c[Chart Debug] TradFi Routing: ${targetSymbol}`, "color: #FF007A; font-weight: bold;");
                }

                this.state.market.activeSymbol = targetSymbol;
                const titleEl = document.getElementById('current-symbol-title');
                if (titleEl) titleEl.innerText = targetSymbol;

                new TradingView.widget({
                    "autosize": true, "symbol": targetSymbol, "interval": "D", "timezone": "Asia/Seoul",
                    "theme": "dark", "style": "1", "locale": "ko", "toolbar_bg": "#0d1117",
                    "enable_publishing": false, "hide_side_toolbar": false, "container_id": "tv_chart_container"
                });
            },

            renderPortfolio() {
                const container = document.getElementById('portfolio-list');
                const emptyMsg = document.getElementById('empty-msg');
                const slotIdx = this.state.portfolio.currentSlot || 0;
                const slotData = this.state.portfolio.slots[slotIdx];
                
                container.innerHTML = '';
                if (slotData.length === 0) {
                    emptyMsg.classList.remove('hidden');
                } else {
                    emptyMsg.classList.add('hidden');
                    slotData.forEach((asset, idx) => {
                        const isUpbitAsset = asset.exchange === 'upbit';
                        const isEditing = this.state.portfolio.editingIndex === idx;
                        const card = document.createElement('div');
                        card.className = `bg-[#0d1117] border border-gray-800 p-3 rounded-xl flex flex-col transition-all cursor-pointer hover:border-gray-600 relative group`;
                        
                        const chartSymbol = isUpbitAsset ? `UPBIT:${asset.sub}KRW` : `BINANCE:${asset.sub}USDT`;
                        const symbol = isUpbitAsset ? '₩' : '$';

                        if (!isEditing) {
                            card.onclick = () => this.changeChartSymbol(chartSymbol);
                            card.innerHTML = `
                                <div class="flex justify-between items-center mb-1.5 border-b border-gray-800/30 pb-1">
                                    <div class="flex items-center gap-1.5">
                                        <span class="text-[12px] font-black text-white uppercase tracking-tighter">${asset.sub}</span>
                                        <span class="text-[7px] px-1 py-0.2 rounded bg-gray-800 text-gray-500 font-bold border border-gray-700">${asset.exchange.toUpperCase()}</span>
                                    </div>
                                    <div class="text-right flex items-center gap-2">
                                        <div id="pct-val-${idx}" class="text-[12px] font-black italic opacity-50">loading...</div>
                                        <div id="profit-val-${idx}" class="text-[9px] font-bold italic opacity-50">loading...</div>
                                    </div>
                                </div>
                                <div class="grid grid-cols-2 gap-x-2">
                                    <div class="flex flex-col space-y-0.5">
                                        <div class="flex items-center justify-between">
                                            <span class="text-[8px] text-gray-500 font-bold uppercase">보유</span>
                                            <span class="text-[10px] font-bold text-gray-200">${this.utils.fmt(asset.quantity, 'num')}</span>
                                        </div>
                                        <div class="flex items-center justify-between">
                                            <span class="text-[8px] text-gray-500 font-bold uppercase">평가</span>
                                            <span id="val-val-${idx}" class="text-[10px] font-bold text-gray-200 italic opacity-50">loading...</span>
                                        </div>
                                    </div>
                                    <div class="flex flex-col space-y-0.5 border-l border-gray-800/30 pl-2">
                                        <div class="flex items-center justify-between">
                                            <span class="text-[8px] text-gray-500 font-bold uppercase">평단</span>
                                            <span class="text-[10px] font-medium text-gray-400">${symbol}${this.utils.fmt(asset.buyPrice, isUpbitAsset ? 'krw' : 'cur')}</span>
                                        </div>
                                        <div class="flex items-center justify-between">
                                            <span class="text-[8px] text-gray-500 font-bold uppercase">매수</span>
                                            <span class="text-[10px] font-medium text-gray-400">${symbol}${this.utils.fmt(asset.buyPrice * asset.quantity, isUpbitAsset ? 'krw' : 'cur')}</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="absolute top-1.5 right-1.5 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                    <button onclick="event.stopPropagation(); JamApp.startEdit(${idx})" class="p-0.5 text-[7px] bg-gray-800 text-gray-500 hover:text-pink-500 rounded border border-gray-700">EDIT</button>
                                    <button onclick="event.stopPropagation(); JamApp.removeAsset(${idx})" class="p-0.5 text-[7px] bg-gray-800 text-gray-500 hover:text-red-500 rounded border border-gray-700">✕</button>
                                </div>`;
                        } else {
                            card.innerHTML = `
                                <div class="flex justify-between items-start mb-2">
                                    <span class="text-[10px] font-black text-pink-500 uppercase tracking-widest">Adjust ${asset.sub}</span>
                                    <div class="flex space-x-2">
                                        <button onclick="event.stopPropagation(); JamApp.saveEdit(${idx})" class="text-[8px] text-green-500 font-black">SAVE</button>
                                        <button onclick="event.stopPropagation(); JamApp.cancelEdit()" class="text-[8px] text-gray-500 font-black">ESC</button>
                                    </div>
                                </div>
                                <div class="grid grid-cols-2 gap-2">
                                    <input type="text" id="edit-price-${idx}" oninput="JamApp.utils.formatInput(this)" value="${this.utils.fmt(asset.buyPrice, 'num')}" class="w-full bg-[#1c2128] border border-gray-700 rounded px-2 py-1 text-[10px] text-white focus:outline-none focus:border-pink-500">
                                    <input type="text" id="edit-qty-${idx}" oninput="JamApp.utils.formatInput(this)" value="${this.utils.fmt(asset.quantity, 'num')}" class="w-full bg-[#1c2128] border border-gray-700 rounded px-2 py-1 text-[10px] text-white focus:outline-none focus:border-pink-500">
                                </div>`;
                        }
                        container.appendChild(card);
                    });
                }
                this.updateRealtimeUI();
                this.updateSlotUI();
            },

            updateSlotUI() {
                [0,1,2].forEach(i => {
                    const btn = document.getElementById(`pslot-${i}`);
                    if (btn) btn.className = `px-2 py-0.5 rounded-md border text-[8px] font-black bg-[#1c2128] transition-all ${i === (this.state.portfolio.currentSlot || 0) ? 'border-pink-500' : 'border-gray-700 opacity-50'}`;
                });
            },

            utils: {
                fmt(val, type = 'cur') {
                    if (val === undefined || val === null || isNaN(val)) return '0';
                    
                    // 정밀 가격 포맷팅 로직
                    if (type === 'cur' || type === 'krw') {
                        const isKRW = type === 'krw';
                        const threshold = isKRW ? 1000 : 1;
                        
                        if (val < threshold) {
                            // 1 미만 (또는 1000원 미만): 소수점 4~6자리 유연 표시
                            return Number(val).toLocaleString(undefined, { 
                                minimumFractionDigits: isKRW ? 2 : 4, 
                                maximumFractionDigits: isKRW ? 2 : 6 
                            });
                        } else {
                            // 1 이상 (또는 1000원 이상): 천 단위 쉼표 + 소수점 2자리 (KRW 1000 이상은 소수점 제거)
                            return Number(val).toLocaleString(undefined, { 
                                minimumFractionDigits: isKRW ? 0 : 2, 
                                maximumFractionDigits: isKRW ? 0 : 2 
                            });
                        }
                    }

                    let options = { minimumFractionDigits: 0, maximumFractionDigits: 2 };
                    if (type === 'pct') options = { minimumFractionDigits: 1, maximumFractionDigits: 1 };
                    else if (type === 'num') options = { maximumFractionDigits: 8 };
                    return Number(val).toLocaleString(undefined, options);
                },
                formatInput(el) {
                    let val = el.value.replace(/,/g, '');
                    if (val === "" || isNaN(val.replace('.', ''))) return;
                    const parts = val.split(".");
                    parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ",");
                    el.value = parts.join(".");
                },
                unformat(str) { return parseFloat(str.replace(/,/g, '')) || 0; }
            },

            init() {
                this.syncExchangeRate();
                setInterval(() => this.syncExchangeRate(), 60000);
                this.syncInitialPrices(); // 초기 즉시 로딩
                this.ws.init();
                this.renderTabs();
                this.renderMarketList();
                this.populateCoinSelect();
                this.renderPortfolio();
                this.changeChartSymbol(this.state.market.activeSymbol);
                this.hub.render();
                console.log("💎 JAM Engine v2.0 Live");
            },

            switchExchange(ex) {
                this.state.market.activeExchange = ex;
                this.state.market.current = "CRYPTO"; // 전환 시 카테고리 초기화
                
                // UI 버튼 업데이트
                document.getElementById('extab-upbit').className = `flex-1 py-1.5 text-[10px] font-black rounded-md transition-all uppercase ${ex === 'upbit' ? 'jam-bg text-white shadow-lg shadow-pink-500/20' : 'text-gray-500 hover:text-white'}`;
                document.getElementById('extab-binance').className = `flex-1 py-1.5 text-[10px] font-black rounded-md transition-all uppercase ${ex === 'binance' ? 'jam-bg text-white shadow-lg shadow-pink-500/20' : 'text-gray-500 hover:text-white'}`;
                
                this.renderTabs();
                this.renderMarketList();
            },

            renderTabs() {
                const container = document.getElementById('market-tabs');
                container.innerHTML = '';
                
                const ex = this.state.market.activeExchange;
                const tabs = ex === 'upbit' ? ['CRYPTO'] : ['CRYPTO', 'COMMODITY', 'STOCK'];
                
                tabs.forEach(tab => {
                    const btn = document.createElement('button');
                    btn.innerText = tab;
                    btn.className = `flex-1 py-2.5 text-[11px] font-black transition-all ${this.state.market.current === tab ? 'tab-active' : 'text-gray-500 hover:text-gray-300'}`;
                    btn.onclick = () => this.switchMarket(tab);
                    container.appendChild(btn);
                });
            },

            switchMarket(tabId) { 
                this.state.market.current = tabId;
                this.syncInitialPrices(); // 탭 전환 시에도 보완 로딩
                this.renderTabs();
                this.renderMarketList();
            },

            renderMarketList() {
                const container = document.getElementById('coin-list');
                const filter = document.getElementById('coin-filter')?.value.toLowerCase() || '';
                const ex = this.state.market.activeExchange;
                
                container.innerHTML = '';
                
                this.cryptoList
                    .filter(c => c.category === this.state.market.current)
                    .filter(c => ex === 'upbit' ? c.upbit : true) // 업비트 모드 시 필터링
                    .filter(c => c.sub.toLowerCase().includes(filter) || c.name.toLowerCase().includes(filter))
                    .forEach(coin => {
                        const price = ex === 'upbit' ? this.state.portfolio.realtimePrices.upbit[coin.id] : this.state.portfolio.realtimePrices.binance[coin.id];
                        const symbol = ex === 'upbit' ? '₩' : '$';
                        const chartSymbol = ex === 'upbit' ? `UPBIT:${coin.sub}KRW` : coin.symbol;
                        
                        const div = document.createElement('div');
                        div.className = `flex items-center justify-between py-2.5 px-4 rounded-xl cursor-pointer hover:bg-[#1c2128] mb-1 transition-all group`;
                        div.setAttribute('data-symbol', chartSymbol);
                        
                        div.onclick = (e) => {
                            const sym = e.currentTarget.getAttribute('data-symbol');
                            this.changeChartSymbol(sym);
                        };
                        
                        div.innerHTML = `
                            <div class="flex items-center space-x-4">
                                <img src="https://assets.coincap.io/assets/icons/${coin.sub.toLowerCase()}@2x.png" class="w-7 h-7 rounded-full border border-gray-800 bg-gray-900 p-0.5" onerror="this.src='https://via.placeholder.com/28'">
                                <div class="flex flex-col">
                                    <div class="flex items-center gap-2">
                                        <span class="text-[12px] font-black ${chartSymbol === this.state.market.activeSymbol ? 'text-pink-500' : 'text-gray-200'} uppercase">${coin.sub}</span>
                                        <span class="text-[10px] font-bold text-gray-500 group-hover:text-gray-400 transition-colors">(${coin.name})</span>
                                    </div>
                                </div>
                            </div>
                            <div class="text-right">
                                <div class="text-[12px] font-black text-white tracking-tight">
                                    ${price > 0 ? symbol + this.utils.fmt(price, ex === 'upbit' ? 'krw' : 'cur') : '<span class="italic text-gray-600 animate-pulse text-[10px]">loading...</span>'}
                                </div>
                            </div>`;
                        container.appendChild(div);
                    });
            },

            setExchange(ex) {
                this.state.portfolio.inputExchange = ex;
                document.getElementById('ex-upbit').className = `px-2 py-0.5 text-[8px] font-black rounded transition-all ${ex==='upbit' ? 'jam-bg text-white' : 'text-gray-500 hover:text-white'} uppercase`;
                document.getElementById('ex-binance').className = `px-2 py-0.5 text-[8px] font-black rounded transition-all ${ex==='binance' ? 'jam-bg text-white' : 'text-gray-500 hover:text-white'} uppercase`;
                document.getElementById('unit-price').innerText = ex === 'upbit' ? '₩' : '$';
            },

            addAsset() {
                const coinData = document.getElementById('p-coin-select').value;
                const price = this.utils.unformat(document.getElementById('p-buy-price').value);
                const qty = this.utils.unformat(document.getElementById('p-quantity').value);
                if (!coinData || price <= 0 || qty <= 0) return alert("Invalid inputs");
                const info = JSON.parse(coinData);
                this.state.portfolio.slots[this.state.portfolio.currentSlot || 0].push({ 
                    id: info.id, sub: info.sub, buyPrice: price, quantity: qty, exchange: this.state.portfolio.inputExchange 
                });
                this.save();
                document.getElementById('p-buy-price').value = '';
                document.getElementById('p-quantity').value = '';
            },

            startEdit(idx) { 
                const asset = this.state.portfolio.slots[this.state.portfolio.currentSlot || 0][idx];
                this.setExchange(asset.exchange || 'binance');
                this.state.portfolio.editingIndex = idx; 
                this.renderPortfolio(); 
            },

            saveEdit(idx) {
                const p = this.utils.unformat(document.getElementById(`edit-price-${idx}`).value);
                const q = this.utils.unformat(document.getElementById(`edit-qty-${idx}`).value);
                const asset = this.state.portfolio.slots[this.state.portfolio.currentSlot || 0][idx];
                asset.buyPrice = p; asset.quantity = q;
                this.state.portfolio.editingIndex = null;
                this.save();
            },

            removeAsset(idx) { if (confirm("Remove?")) { this.state.portfolio.slots[this.state.portfolio.currentSlot || 0].splice(idx, 1); this.save(); } },
            save() { localStorage.setItem('jam_data_v2', JSON.stringify(this.state.portfolio.slots)); this.renderPortfolio(); },
            switchSlot(idx) { this.state.portfolio.currentSlot = idx; this.renderPortfolio(); },
            
            populateCoinSelect() {
                const s = document.getElementById('p-coin-select');
                s.innerHTML = '<option value="" disabled selected>Select Coin</option>';
                this.cryptoList.forEach(c => {
                    const o = document.createElement('option');
                    o.value = JSON.stringify({id: c.id, sub: c.sub});
                    o.innerText = `${c.sub} - ${c.name}`;
                    s.appendChild(o);
                });
            },

            hub: {
                save() { localStorage.setItem('jam_hub_links', JSON.stringify(JamApp.state.hubLinks)); },
                addLink() {
                    const n = prompt("Name:"); const u = prompt("URL:");
                    if (n && u) { JamApp.state.hubLinks.push({ name: n, url: u.startsWith('http') ? u : 'https://'+u }); this.save(); this.render(); }
                },
                render() {
                    const c = document.getElementById('hub-grid');
                    if (!c) return;
                    document.querySelectorAll('.custom-hub-link').forEach(el => el.remove());
                    JamApp.state.hubLinks.forEach((l, i) => {
                        const a = document.createElement('a');
                        a.href = l.url; a.target = "_blank"; a.className = "hub-btn py-2.5 rounded-xl text-[11px] font-black px-3 gap-2 custom-hub-link";
                        const d = new URL(l.url).hostname;
                        a.innerHTML = `<img src="https://www.google.com/s2/favicons?domain=${d}&sz=32" class="w-4 h-4">${l.name.toUpperCase()}`;
                        a.oncontextmenu = (e) => { e.preventDefault(); if (confirm("Remove?")) { JamApp.state.hubLinks.splice(i, 1); this.save(); this.render(); } };
                        c.insertBefore(a, c.lastElementChild);
                    });
                }
            }
        };

        window.onload = () => JamApp.init();
        // 메모: 코모디티, 주식 가격 바로반영 업데이트
        </script>
        </body>
        </html>
