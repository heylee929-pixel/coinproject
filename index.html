<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Jam | Real-time Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0d1117; color: #f0f6fc; overflow-x: hidden; }
        .tv-chart-container { height: 450px; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0d1117; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
        
        /* Layout Configuration (20% | 55% | 25%) */
        .jam-grid-container {
            display: grid;
            grid-template-columns: 20% 55% 25%;
            gap: 15px;
            max-width: 1600px;
            margin: 0 auto;
            padding: 1rem;
        }
        @media (max-width: 1280px) {
            .jam-grid-container { grid-template-columns: 25% 75%; }
            .jam-right-column { grid-column: span 2; }
        }
        @media (max-width: 1024px) {
            .jam-grid-container { grid-template-columns: 1fr; }
            .jam-right-column { grid-column: span 1; }
        }

        /* Compact List Styles */
        .coin-item-compact {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0.75rem;
            border-radius: 0.75rem;
            transition: all 0.2s;
            cursor: pointer;
            margin-bottom: 0.25rem;
            gap: 10px;
        }
        .coin-item-compact:hover { background-color: #1c2128; }
        .coin-name-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            overflow: hidden;
            flex-shrink: 1;
        }
        .coin-symbol-text {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-weight: 800;
            font-size: 11px;
            display: flex;
            align-items: baseline;
            gap: 4px;
        }
        .coin-price-text {
            white-space: nowrap;
            font-weight: 800;
            font-size: 11px;
            text-align: right;
            flex-shrink: 0;
        }

        /* JAM 포인트 컬러 및 효과 */
        .jam-accent { color: #FF007A; text-shadow: 0 0 15px rgba(255, 0, 122, 0.4); }
        .jam-bg { background-color: #FF007A; }
        .tab-active { color: #FF007A; background-color: #1c2128; box-shadow: inset 0 -2px 0 #FF007A; }
        
        /* 수익/손실 네온 효과 */
        .profit-glow { color: #00d1ff !important; text-shadow: 0 0 10px rgba(0, 209, 255, 0.6); font-weight: 800; }
        .loss-glow { color: #ff4d4d !important; text-shadow: 0 0 10px rgba(255, 77, 77, 0.6); font-weight: 800; }
        
        /* 실시간 시세 변동 플래시 효과 */
        .price-up { color: #00ffa2 !important; transition: all 0.2s; }
        .price-down { color: #ff007a !important; transition: all 0.2s; }
        
        @keyframes jam-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .jam-loading { animation: jam-pulse 1.5s infinite; }

        /* CRYPTO HUB 버튼 스타일 */
        .hub-btn { 
            background-color: #161b22; 
            border: 1px solid #30363d; 
            color: #ffffff; 
            transition: all 0.2s ease; 
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 100%;
        }
        .hub-btn:hover { 
            border-color: #FF007A; 
            color: #FF007A; 
            box-shadow: 0 0 15px rgba(255, 0, 122, 0.3);
            background-color: #1c2128;
        }

        /* 즐겨찾기 별 스타일 */
        .star-icon {
            color: #4b5563;
            transition: all 0.2s;
            cursor: pointer;
            z-index: 10;
        }
        .star-icon.active {
            color: #FFD700;
            text-shadow: 0 0 8px rgba(255, 215, 0, 0.5);
        }
        .star-icon:hover {
            transform: scale(1.2);
            color: #FFD700;
        }

        /* MY 탭 리스트 애니메이션 */
        .fav-item-exit {
            opacity: 0;
            transform: translateX(-20px);
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <!-- ==========================================
         [1] TOP TICKER SECTION
         ========================================== -->
    <div class="w-full border-b border-gray-800 bg-[#0d1117]">
        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
        {
            "symbols": [
                {"proName": "BINANCE:BTCUSDT", "title": "BTC"},
                {"proName": "BINANCE:ETHUSDT", "title": "ETH"},
                {"proName": "BINANCE:SOLUSDT", "title": "SOL"},
                {"proName": "BINANCE:XRPUSDT", "title": "XRP"},
                {"proName": "BINANCE:DOGEUSDT", "title": "DOGE"},
                {"proName": "BINANCE:ADAUSDT", "title": "ADA"},
                {"proName": "BINANCE:LINKUSDT", "title": "LINK"}
            ],
            "showSymbolLogo": true,
            "colorTheme": "dark",
            "isTransparent": true,
            "displayMode": "adaptive",
            "locale": "ko"
        }
        </script>
    </div>

    <!-- ==========================================
         [2] HEADER SECTION
         ========================================== -->
    <header class="border-b border-gray-800 bg-[#0d1117]/90 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-[1600px] mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="p-1.5 bg-pink-500/10 rounded-lg">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" class="jam-accent">
                        <path d="M6 8C6 6.89543 6.89543 6 8 6H16C17.1046 6 18 6.89543 18 8V18C18 20.2091 16.2091 22 14 22H10C7.79086 22 6 20.2091 6 18V8Z" fill="currentColor" fill-opacity="0.2" stroke="currentColor" stroke-width="2.5"/>
                    </svg>
                </div>
                <span class="text-2xl font-black tracking-tighter italic uppercase">CRYPTO <span class="jam-accent">JAM</span></span>
            </div>
            <div class="flex items-center space-x-2 text-[11px] text-gray-500 font-bold tracking-widest">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-[0_0_8px_#22c55e]"></span>
                <span>REAL-TIME ENGINE LIVE</span>
            </div>
        </div>
    </header>

    <!-- ==========================================
         [3] MAIN CONTENT
         ========================================== -->
    <main class="flex-grow w-full">
        <div class="jam-grid-container">
            
            <!-- [A] Market List (Left - 20%) -->
            <div>
                <section class="bg-[#161b22] border border-gray-800 rounded-2xl overflow-hidden flex flex-col h-[calc(100vh-160px)] shadow-2xl">
                    <!-- Exchange Switcher -->

                        <div class="flex bg-[#161b22] rounded-lg p-1 border border-gray-800">
                            <button onclick="JamApp.switchExchange('upbit')" id="extab-upbit" class="flex-1 py-1.5 text-[10px] font-black rounded-md transition-all text-gray-500 hover:text-white uppercase">Upbit</button>
                            <button onclick="JamApp.switchExchange('binance')" id="extab-binance" class="flex-1 py-1.5 text-[10px] font-black rounded-md transition-all text-gray-500 hover:text-white uppercase">Binance</button>
                            <button onclick="JamApp.switchExchange('my')" id="extab-my" class="flex-1 py-1.5 text-[10px] font-black rounded-md transition-all text-gray-500 hover:text-white uppercase">MY</button>
                        </div>
                    </div>
                    <!-- Category Tabs -->
                    <div id="market-tabs" class="flex border-b border-gray-800 bg-[#0d1117]">
                        <!-- Dynamic Tabs Here -->
                    </div>
                    <!-- Filter Search -->
                    <div class="p-2 border-b border-gray-800">
                        <input type="text" id="coin-filter" oninput="JamApp.renderMarketList()" placeholder="Quick Search..." class="w-full bg-[#0d1117] border border-gray-700 rounded-lg px-3 py-2 text-[12px] focus:outline-none focus:border-pink-500 transition-colors">
                    </div>
                    <!-- Coin List -->
                    <div id="coin-list" class="flex-grow overflow-y-auto custom-scrollbar p-1.5"></div>
                </section>
            </div>

            <!-- [B] Chart & Hub (Center - 55%) -->

                        <div class="flex items-center space-x-3">
                            <div class="w-2 h-4 jam-bg rounded-full"></div>
                            <h2 id="current-symbol-title" class="font-black text-sm text-white tracking-tight uppercase">BINANCE:BTCUSDT</h2>
                        </div>
                        <span class="text-[10px] text-gray-500 font-bold uppercase tracking-[0.2em]">Global Market Terminal</span>
                    </div>
                    <div id="tv_chart_container" class="tv-chart-container"></div>
                </section>

                    </div>
                    <div class="p-4">
                        <div class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 gap-3" id="hub-grid">
                            <a href="https://upbit.com" target="_blank" class="hub-btn py-3 rounded-xl text-[10px] font-black hover:scale-[1.05] transform transition-all gap-2 flex-col">
                                <img src="https://www.google.com/s2/favicons?domain=upbit.com&sz=32" class="w-5 h-5" alt="">
                                UPBIT
                            </a>
                            <a href="https://www.binance.com" target="_blank" class="hub-btn py-3 rounded-xl text-[10px] font-black hover:scale-[1.05] transform transition-all gap-2 flex-col">
                                <img src="https://www.google.com/s2/favicons?domain=binance.com&sz=32" class="w-5 h-5" alt="">
                                BINANCE
                            </a>
                            <a href="https://www.okx.com" target="_blank" class="hub-btn py-3 rounded-xl text-[10px] font-black hover:scale-[1.05] transform transition-all gap-2 flex-col">
                                <img src="https://www.google.com/s2/favicons?domain=okx.com&sz=32" class="w-5 h-5" alt="">
                                OKX
                            </a>
                            <a href="https://coinmarketcap.com" target="_blank" class="hub-btn py-3 rounded-xl text-[10px] font-black hover:scale-[1.05] transform transition-all gap-2 flex-col">
                                <img src="https://www.google.com/s2/favicons?domain=coinmarketcap.com&sz=32" class="w-5 h-5" alt="">
                                CMC
                            </a>
                            <a href="https://coinness.com" target="_blank" class="hub-btn py-3 rounded-xl text-[10px] font-black hover:scale-[1.05] transform transition-all gap-2 flex-col">
                                <img src="https://www.google.com/s2/favicons?domain=coinness.com&sz=32" class="w-5 h-5" alt="">
                                NEWS

                        </div>

                </section>

                                </div>
                            </div>
                            
                            <!-- Searchable Combo-box -->
                            <div class="relative group/search">
                                <input type="text" id="p-coin-search" autocomplete="off" placeholder="Search Ticker..." 
                                       class="w-full bg-[#161b22] border border-gray-700 rounded-lg px-3 py-2 text-[10px] font-bold focus:outline-none focus:border-pink-500 transition-all"
                                       onfocus="JamApp.deploy.showResults()" 
                                       oninput="JamApp.deploy.filterResults(this.value)"
                                       onkeydown="JamApp.deploy.handleKey(event)">
                                <div id="p-search-results" class="absolute left-0 right-0 top-full mt-1 bg-[#1c2128] border border-gray-700 rounded-lg shadow-2xl z-[60] max-h-48 overflow-y-auto hidden custom-scrollbar">
                                    <!-- Results injected here -->
                                </div>
                            </div>

                            <div class="grid grid-cols-2 gap-2">
                                <div class="relative">
                                    <span id="unit-price" class="absolute left-2 top-1/2 -translate-y-1/2 text-[9px] font-bold text-gray-500">$</span>
                                    <input type="text" id="p-buy-price" oninput="JamApp.utils.formatInput(this)" placeholder="Price" class="w-full bg-[#161b22] border border-gray-700 rounded-lg pl-5 pr-2 py-2 text-[10px] focus:outline-none focus:border-pink-500">
                                </div>
                                <div class="relative">
                                    <span class="absolute left-2 top-1/2 -translate-y-1/2 text-[9px] font-bold text-gray-500">#</span>
                                    <input type="text" id="p-quantity" oninput="JamApp.utils.formatInput(this)" placeholder="Qty" class="w-full bg-[#161b22] border border-gray-700 rounded-lg pl-5 pr-2 py-2 text-[10px] focus:outline-none focus:border-pink-500">
                                </div>
                            </div>
                            <button onclick="JamApp.addAsset()" class="w-full jam-bg hover:opacity-90 text-white py-2.5 rounded-lg text-[10px] font-black uppercase shadow-lg shadow-pink-500/20 transition-all active:scale-95">Add Position</button>
                        </div>

                        <!-- Asset List -->
                        <div id="portfolio-list" class="space-y-2"></div>
                        <div id="empty-msg" class="text-center py-10 text-gray-600 text-[10px] font-bold italic uppercase tracking-widest">No Active Positions</div>
                    </div>
                </section>
            </div>

        </div>
    </main>

    <!-- ==========================================
         [4] FOOTER SECTION
         ========================================== -->
    <footer class="border-t border-gray-800 py-6 bg-[#0d1117]">
        <div class="max-w-[1600px] mx-auto px-4 text-center text-gray-600 text-[10px] font-bold tracking-[0.3em] uppercase">
            &copy; 2026 CRYPTO <span class="text-pink-600">JAM</span> TERMINAL.
        </div>
    </footer>

                showResults() {
                    this.filterResults(document.getElementById('p-coin-search').value);
                },

                filterResults(query) {
                    const res = document.getElementById('p-search-results');
                    const q = query.toLowerCase();
                    const ex = JamApp.state.portfolio.inputExchange;
                    
                    this.filteredList = JamApp.cryptoList
                        .filter(c => ex === 'upbit' ? c.upbit : true)
                        .filter(c => c.sub.toLowerCase().includes(q) || c.name.toLowerCase().includes(q));

                    if (this.filteredList.length === 0) {
                        res.classList.add('hidden');
                        return;
                    }

                    this.activeIndex = -1;
                    res.innerHTML = this.filteredList.map((c, i) => `
                        <div onclick="JamApp.deploy.select(${i})" id="search-res-${i}" class="px-3 py-2 text-[10px] font-bold cursor-pointer hover:bg-pink-500/10 border-b border-gray-800/50 flex justify-between items-center transition-colors">

                            <span class="text-[8px] px-1 rounded bg-gray-800 text-gray-400">${c.category}</span>
                        </div>
                    `).join('');
                    res.classList.remove('hidden');
                },

                handleKey(e) {
                    const res = document.getElementById('p-search-results');
                    if (res.classList.contains('hidden')) return;

                    if (e.key === 'ArrowDown') {
                        e.preventDefault();
                        this.activeIndex = Math.min(this.activeIndex + 1, this.filteredList.length - 1);
                        this.updateHighlight();
                    } else if (e.key === 'ArrowUp') {
                        e.preventDefault();
                        this.activeIndex = Math.max(this.activeIndex - 1, 0);
                        this.updateHighlight();
                    } else if (e.key === 'Enter') {
                        e.preventDefault();
                        if (this.activeIndex >= 0) this.select(this.activeIndex);
                    } else if (e.key === 'Escape') {
                        res.classList.add('hidden');
                    }
                },

                    document.querySelectorAll('[id^=\"search-res-\"]').forEach(el => el.classList.remove('bg-pink-500/20', 'text-pink-500'));

                        active.scrollIntoView({ block: 'nearest' });

            async syncInitialPrices() {
                try {
                    const response = await fetch('https://fapi.binance.com/fapi/v1/ticker/price');
                    const data = await response.json();
                    let updated = false;
                    data.forEach(t => {
                        const coin = this.cryptoList.find(c => c.symbol === `BINANCE:${t.symbol}`);
                        if (coin) {
                            const price = parseFloat(t.price);
                            if (price > 0) {
                                this.state.portfolio.realtimePrices.binance[coin.id] = price;
                                updated = true;
                            }
                        }
                    });
                    if (updated) {
                        this.renderMarketList();
                        this.updateRealtimeUI();
                    }
                } catch (e) {
                    console.error("Initial Price Sync Failed", e);
                }

            ws: {
                binance: null,
                upbit: null,
                futures: null,

                init() {
                    this.initBinance();
                    this.initUpbit();
                    this.initFutures();
                },

                initBinance() {
                    if (this.binance) return;
                    this.binance = new WebSocket("wss://stream.binance.com:9443/ws/!miniTicker@arr");
                    this.binance.onmessage = (msg) => {
                        const data = JSON.parse(msg.data);
                        let updated = false;
                        data.forEach(t => {
                            const sub = t.s.replace('USDT', '');
                            const coin = JamApp.cryptoList.find(c => c.sub === sub && c.category === 'CRYPTO');
                            if (coin) {
                                const price = parseFloat(t.c);
                                JamApp.state.portfolio.prevPrices.binance[coin.id] = JamApp.state.portfolio.realtimePrices.binance[coin.id];
                                JamApp.state.portfolio.realtimePrices.binance[coin.id] = price;
                                updated = true;
                            }
                        });
                        if (updated) JamApp.updateRealtimeUI();
                    };
                    this.binance.onclose = () => { this.binance = null; setTimeout(() => this.initBinance(), 3000); };
                },

                initFutures() {
                    if (this.futures) return;
                    this.futures = new WebSocket("wss://fstream.binance.com/ws/!miniTicker@arr");
                    this.futures.onmessage = (msg) => {
                        const data = JSON.parse(msg.data);
                        let updated = false;
                        data.forEach(t => {
                            const coin = JamApp.cryptoList.find(c => c.symbol === `BINANCE:${t.s}`);
                            if (coin && (coin.category === 'COMMODITY' || coin.category === 'STOCK')) {
                                const price = parseFloat(t.c);
                                JamApp.state.portfolio.prevPrices.binance[coin.id] = JamApp.state.portfolio.realtimePrices.binance[coin.id];
                                JamApp.state.portfolio.realtimePrices.binance[coin.id] = price;
                                updated = true;

                        });

                    this.futures.onclose = () => { this.futures = null; setTimeout(() => this.initFutures(), 3000); };
                },

                initUpbit() {
                    if (this.upbit) return;
                    this.upbit = new WebSocket("wss://api.upbit.com/websocket/v1");
                    this.upbit.onopen = () => {
                        const codes = JamApp.cryptoList.filter(c => c.upbit).map(c => `KRW-${c.sub}`);
                        this.upbit.send(JSON.stringify([{ ticket: "JAM-ENGINE" }, { type: "ticker", codes }]));

            // [Targeted UI Updater]
            updateRealtimeUI() {
                const slotIdx = this.state.portfolio.currentSlot || 0;
                const slotData = this.state.portfolio.slots[slotIdx];
                const fixedRate = this.state.system.fixedRate;
                const isDisplayKRW = this.state.system.displayCurrency === 'KRW';
                
                let totalValUSD = 0, totalCostUSD = 0;
                let totalValKRW = 0, totalCostKRW = 0;

                slotData.forEach((asset, idx) => {
                    const isUpbitAsset = asset.exchange === 'upbit';
                    const curPrice = isUpbitAsset ? this.state.portfolio.realtimePrices.upbit[asset.id] : this.state.portfolio.realtimePrices.binance[asset.id];
                    const symbol = isUpbitAsset ? '₩' : '$';

                    if (curPrice) {
                        const val = curPrice * asset.quantity;
                        const cost = asset.buyPrice * asset.quantity;
                        const profit = val - cost;
                        const profitPct = cost > 0 ? (profit / cost) * 100 : 0;
                        const profitClass = profit >= 0 ? 'profit-glow' : 'loss-glow';

                        if (isUpbitAsset) {
                            totalValKRW += val; totalCostKRW += cost;
                            totalValUSD += val / fixedRate; totalCostUSD += cost / fixedRate;
                        } else {
                            totalValUSD += val; totalCostUSD += cost;
                            totalValKRW += val * fixedRate; totalCostKRW += cost * fixedRate;
                        }

                        const valEl = document.getElementById(`val-val-${idx}`);
                        const profitEl = document.getElementById(`profit-val-${idx}`);
                        const pctEl = document.getElementById(`pct-val-${idx}`);

                        if (valEl) valEl.innerText = `${symbol}${this.utils.fmt(val, isUpbitAsset ? 'krw' : 'cur')}`;
                        if (profitEl) {
                            profitEl.innerText = `${profit >= 0 ? '+' : '-'}${symbol}${this.utils.fmt(Math.abs(profit), isUpbitAsset ? 'krw' : 'cur')}`;
                            profitEl.className = `text-[9px] font-bold ${profitClass}`;
                        }
                        if (pctEl) {
                            pctEl.innerText = `${profit >= 0 ? '+' : ''}${this.utils.fmt(profitPct, 'pct')}%`;
                            pctEl.className = `text-[12px] font-black ${profitClass}`;
                        }
                    }
                });

                const finalVal = isDisplayKRW ? totalValKRW : totalValUSD;
                const finalCost = isDisplayKRW ? totalCostKRW : totalCostUSD;
                const finalProfit = finalVal - finalCost;
                const finalSymbol = isDisplayKRW ? '₩' : '$';
                const totalROI = finalCost > 0 ? (finalProfit / finalCost) * 100 : 0;
                const totalProfitClass = finalProfit >= 0 ? 'profit-glow' : 'loss-glow';

                document.getElementById('total-balance').innerText = `${finalSymbol}${this.utils.fmt(finalVal, isDisplayKRW ? 'krw' : 'cur')}`;
                const roiEl = document.getElementById('total-roi');
                if (roiEl) {
                    roiEl.innerText = `${totalROI >= 0 ? '+' : ''}${this.utils.fmt(totalROI, 'pct')}%`;
                    const bgClass = totalROI >= 0 ? 'bg-blue-500/10' : 'bg-red-500/10';
                    roiEl.className = `text-[12px] font-black px-1.5 py-0.5 rounded ${bgClass} ${totalProfitClass}`;
                }
                const profitAmtEl = document.getElementById('total-profit-amt');
                if (profitAmtEl) {
                    profitAmtEl.innerText = `${finalProfit >= 0 ? '+' : '-'}${finalSymbol}${this.utils.fmt(Math.abs(finalProfit), isDisplayKRW ? 'krw' : 'cur')}`;
                    profitAmtEl.className = `text-lg font-black ${totalProfitClass}`;
                }
            },

                });

            utils: {
                fmt(val, type = 'cur') {
                    if (val === undefined || val === null || isNaN(val)) return '0';
                    
                    // 정밀 가격 포맷팅 로직
                    if (type === 'cur' || type === 'krw') {
                        const isKRW = type === 'krw';
                        const threshold = isKRW ? 1000 : 1;
                        
                        if (val < threshold) {
                            // 1 미만 (또는 1000원 미만): 소수점 4~6자리 유연 표시
                            return Number(val).toLocaleString(undefined, { 
                                minimumFractionDigits: isKRW ? 2 : 4, 
                                maximumFractionDigits: isKRW ? 2 : 6 
                            });
                        } else {
                            // 1 이상 (또는 1000원 이상): 천 단위 쉼표 + 소수점 2자리 (KRW 1000 이상은 소수점 제거)
                            return Number(val).toLocaleString(undefined, { 
                                minimumFractionDigits: isKRW ? 0 : 2, 
                                maximumFractionDigits: isKRW ? 0 : 2 
                            });
                        }
                    }

                    let options = { minimumFractionDigits: 0, maximumFractionDigits: 2 };
                    if (type === 'pct') options = { minimumFractionDigits: 1, maximumFractionDigits: 1 };
                    else if (type === 'num') options = { maximumFractionDigits: 8 };
                    return Number(val).toLocaleString(undefined, options);
                },
                formatInput(el) {
                    let val = el.value.replace(/,/g, '');
                    if (val === \"\" || isNaN(val.replace('.', ''))) return;
                    const parts = val.split(\".\");
                    parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, \",\");
                    el.value = parts.join(\".\");
                },
                unformat(str) { return parseFloat(str.replace(/,/g, '')) || 0; },
                handleImgError(img, initial) {
                    img.onerror = null;
                    img.src = `https://ui-avatars.com/api/?name=${initial}&background=random&color=fff&size=32`;
                }
            },

                this.renderPortfolio();
                this.changeChartSymbol(this.state.market.activeSymbol);
                this.hub.render();
                console.log(\"💎 JAM Engine v2.0 Live\");

            switchExchange(ex) {
                this.state.market.activeExchange = ex;
                if (ex !== 'my') {
                    this.state.market.current = \"CRYPTO\"; // 전환 시 카테고리 초기화

                }
                
                // UI 버튼 업데이트
                document.getElementById('extab-upbit').className = `flex-1 py-1.5 text-[10px] font-black rounded-md transition-all uppercase ${ex === 'upbit' ? 'jam-bg text-white shadow-lg shadow-pink-500/20' : 'text-gray-500 hover:text-white'}`;
                document.getElementById('extab-binance').className = `flex-1 py-1.5 text-[10px] font-black rounded-md transition-all uppercase ${ex === 'binance' ? 'jam-bg text-white shadow-lg shadow-pink-500/20' : 'text-gray-500 hover:text-white'}`;
                document.getElementById('extab-my').className = `flex-1 py-1.5 text-[10px] font-black rounded-md transition-all uppercase ${ex === 'my' ? 'jam-bg text-white shadow-lg shadow-pink-500/20' : 'text-gray-500 hover:text-white'}`;
                
                this.renderTabs();
                this.renderMarketList();
            },

            renderTabs() {
                const container = document.getElementById('market-tabs');
                container.innerHTML = '';
                
                const ex = this.state.market.activeExchange;
                if (ex === 'my') return; 

                const tabs = ex === 'upbit' ? ['CRYPTO'] : ['CRYPTO', 'COMMODITY', 'STOCK'];
                
                tabs.forEach(tab => {
                    const btn = document.createElement('button');
                    btn.innerText = tab;
                    btn.className = `flex-1 py-2.5 text-[11px] font-black transition-all ${this.state.market.current === tab ? 'tab-active' : 'text-gray-500 hover:text-gray-300'}`;
                    btn.onclick = () => this.switchMarket(tab);
                    container.appendChild(btn);
                });
            },

            switchMarket(tabId) { 
                this.state.market.current = tabId;
                this.syncInitialPrices(); // 탭 전환 시에도 보완 로딩
                this.renderTabs();
                this.renderMarketList();
            },

            renderMarketList() {
                const container = document.getElementById('coin-list');
                const filter = document.getElementById('coin-filter')?.value.toLowerCase() || '';
                const ex = this.state.market.activeExchange;
                
                container.innerHTML = '';
                
                let listToRender = [];
                if (ex === 'my') {
                    this.state.market.favorites.forEach(favId => {
                        const [favEx, favSub] = favId.split('-');
                        const coin = this.cryptoList.find(c => c.sub === favSub);
                        if (coin) {
                            listToRender.push({ ...coin, forcedExchange: favEx });
                        }
                    });
                } else {
                    listToRender = this.cryptoList
                        .filter(c => c.category === this.state.market.current)
                        .filter(c => ex === 'upbit' ? c.upbit : true)
                        .map(c => ({ ...c, forcedExchange: ex }));
                }

                listToRender
                    .filter(c => c.sub.toLowerCase().includes(filter) || c.name.toLowerCase().includes(filter))
                    .forEach(coin => {
                        const currentEx = coin.forcedExchange;
                        const price = currentEx === 'upbit' ? this.state.portfolio.realtimePrices.upbit[coin.id] : this.state.portfolio.realtimePrices.binance[coin.id];
                        const symbol = currentEx === 'upbit' ? '₩' : '$';
                        const chartSymbol = currentEx === 'upbit' ? `UPBIT:${coin.sub}KRW` : coin.symbol;
                        const favId = `${currentEx}-${coin.sub}`;
                        const isFav = this.state.market.favorites.includes(favId);

                        let logoUrl = `https://assets.coincap.io/assets/icons/${coin.sub.toLowerCase()}@2x.png`;
                        let logoBg = \"bg-gray-900\";

                        if (coin.category === 'STOCK' || coin.category === 'COMMODITY') {
                            const mappingId = this.tvLogoMapping[coin.sub];
                            if (mappingId) {
                                logoUrl = `https://s3-symbol-logo.tradingview.com/${mappingId}--big.svg`;
                                logoBg = \"bg-white\";
                            }
                        }
                        
                        const div = document.createElement('div');
                        div.className = `coin-item-compact group`;
                        div.setAttribute('data-symbol', chartSymbol);
                        div.setAttribute('data-fav-id', favId);
                        
                        div.onclick = (e) => {
                            const sym = e.currentTarget.getAttribute('data-symbol');
                            this.changeChartSymbol(sym);
                            this.setExchange(currentEx); 
                            this.deploy.autoPopulate(coin); 
                        };
                        
                        div.innerHTML = `
                            <div class=\"coin-name-wrap\">
                                <div onclick=\"JamApp.toggleFavorite('${currentEx}', '${coin.sub}', event)\" class=\"star-icon ${isFav ? 'active' : ''} mr-1\">
                                    <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"currentColor\" stroke=\"currentColor\" stroke-width=\"2\">
                                        <path d=\"M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 21 12 17.27 5.82 21 7 14.14l-5-4.87 6.91-1.01L12 2z\"></path>
                                    </svg>
                                </div>
                                <img src=\"${logoUrl}\" 
                                     class=\"w-5 h-5 rounded-full border border-gray-800 ${logoBg} p-0.5 flex-shrink-0\" 
                                     onerror=\"JamApp.utils.handleImgError(this, '${coin.sub[0]}')\">
                                <span class=\"coin-symbol-text ${chartSymbol === this.state.market.activeSymbol ? 'text-pink-500' : 'text-gray-200'} uppercase\">
                                    ${coin.sub} <span class=\"text-[9px] text-gray-500 font-medium normal-case\">(${coin.name})</span>
                                </span>
                            </div>
                            <div class=\"coin-price-text text-white tracking-tight\">
                                ${price > 0 ? symbol + this.utils.fmt(price, currentEx === 'upbit' ? 'krw' : 'cur') : '<span class=\"italic text-gray-600 animate-pulse text-[10px]\">...</span>'}
                            </div>`;
                        container.appendChild(div);
                    });
            },

            setExchange(ex) {
                this.state.portfolio.inputExchange = ex;
                document.getElementById('ex-upbit').className = `px-3 py-0.5 text-[8px] font-black rounded transition-all ${ex==='upbit' ? 'jam-bg text-white' : 'text-gray-500 hover:text-white'} uppercase`;
                document.getElementById('ex-binance').className = `px-3 py-0.5 text-[8px] font-black rounded transition-all ${ex==='binance' ? 'jam-bg text-white' : 'text-gray-500 hover:text-white'} uppercase`;
                document.getElementById('unit-price').innerText = ex === 'upbit' ? '₩' : '$';
            },

            addAsset() {
                const coin = this.state.portfolio.selectedCoin;
                const price = this.utils.unformat(document.getElementById('p-buy-price').value);
                const qty = this.utils.unformat(document.getElementById('p-quantity').value);
                if (!coin || price <= 0 || qty <= 0) return alert(\"Please select a coin and enter valid price/qty\");
                
                this.state.portfolio.slots[this.state.portfolio.currentSlot || 0].push({ 
                    id: coin.id, sub: coin.sub, buyPrice: price, quantity: qty, exchange: this.state.portfolio.inputExchange 
                });
                this.save();
                
                // Reset fields
                document.getElementById('p-coin-search').value = '';
                document.getElementById('p-buy-price').value = '';
                document.getElementById('p-quantity').value = '';
                this.state.portfolio.selectedCoin = null;
            },

            startEdit(idx) { 
                const asset = this.state.portfolio.slots[this.state.portfolio.currentSlot || 0][idx];
                this.setExchange(asset.exchange || 'binance');
                this.state.portfolio.editingIndex = idx; 
                this.renderPortfolio(); 
            },

            saveEdit(idx) {
                const p = this.utils.unformat(document.getElementById(`edit-price-${idx}`).value);
                const q = this.utils.unformat(document.getElementById(`edit-qty-${idx}`).value);
                const asset = this.state.portfolio.slots[this.state.portfolio.currentSlot || 0][idx];
                asset.buyPrice = p; asset.quantity = q;
                this.state.portfolio.editingIndex = null;
                this.save();
            },

            removeAsset(idx) { if (confirm(\"Remove?\")) { this.state.portfolio.slots[this.state.portfolio.currentSlot || 0].splice(idx, 1); this.save(); } },
            save() { localStorage.setItem('jam_data_v2', JSON.stringify(this.state.portfolio.slots)); this.renderPortfolio(); },
            switchSlot(idx) { this.state.portfolio.currentSlot = idx; this.renderPortfolio(); },

            hub: {
                save() { localStorage.setItem('jam_hub_links', JSON.stringify(JamApp.state.hubLinks)); },
                addLink() {
                    const n = prompt(\"Name:\"); const u = prompt(\"URL:\");
                    if (n && u) { JamApp.state.hubLinks.push({ name: n, url: u.startsWith('http') ? u : 'https://'+u }); this.save(); this.render(); }
                },
                render() {
                    const c = document.getElementById('hub-grid');
                    if (!c) return;
                    document.querySelectorAll('.custom-hub-link').forEach(el => el.remove());
                    JamApp.state.hubLinks.forEach((l, i) => {
                        const a = document.createElement('a');
                        a.href = l.url; a.target = \"_blank\"; a.className = \"hub-btn py-2.5 rounded-xl text-[11px] font-black px-3 gap-2 custom-hub-link\";
                        const d = new URL(l.url).hostname;
                        a.innerHTML = `<img src=\"https://www.google.com/s2/favicons?domain=${d}&sz=32\" class=\"w-4 h-4\">${l.name.toUpperCase()}`;
                        a.oncontextmenu = (e) => { e.preventDefault(); if (confirm(\"Remove?\")) { JamApp.state.hubLinks.splice(i, 1); this.save(); this.render(); } };
                        c.insertBefore(a, c.lastElementChild);
                    });
                }
            }
        };

        window.onload = () => JamApp.init();
    </script>
</body>
</html>
