<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Jam | Real-time Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0d1117; color: #f0f6fc; overflow-x: hidden; }
        .tv-chart-container { height: 450px; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0d1117; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
        
        /* JAM 포인트 컬러 및 효과 */
        .jam-accent { color: #FF007A; text-shadow: 0 0 15px rgba(255, 0, 122, 0.4); }
        .jam-bg { background-color: #FF007A; }
        .tab-active { border-bottom: 2px solid #FF007A; color: #FF007A; }
        
        /* 수익/손실 네온 효과 */
        .profit-glow { color: #00d1ff !important; text-shadow: 0 0 10px rgba(0, 209, 255, 0.6); font-weight: 800; }
        .loss-glow { color: #ff4d4d !important; text-shadow: 0 0 10px rgba(255, 77, 77, 0.6); font-weight: 800; }
        
        /* 카드 활성화(Active) 스타일 */
        .card-active { 
            border-color: #FF007A !important; 
            box-shadow: 0 0 20px rgba(255, 0, 122, 0.2);
            transform: scale(1.02);
            background-color: #1c2128 !important;
        }

        @keyframes jam-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .jam-loading { animation: jam-pulse 1.5s infinite; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <!-- 상단 실시간 티커 -->
    <div class="w-full border-b border-gray-800 bg-[#0d1117]">
        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
        {
            "symbols": [
                {"proName": "BINANCE:BTCUSDT", "title": "BTC"},
                {"proName": "BINANCE:ETHUSDT", "title": "ETH"},
                {"proName": "BINANCE:SOLUSDT", "title": "SOL"},
                {"proName": "BINANCE:XRPUSDT", "title": "XRP"},
                {"proName": "BINANCE:DOGEUSDT", "title": "DOGE"},
                {"proName": "BINANCE:ADAUSDT", "title": "ADA"},
                {"proName": "BINANCE:LINKUSDT", "title": "LINK"}
            ],
            "showSymbolLogo": true,
            "colorTheme": "dark",
            "isTransparent": true,
            "displayMode": "adaptive",
            "locale": "ko"
        }
        </script>
    </div>

    <!-- 헤더 -->
    <header class="border-b border-gray-800 bg-[#0d1117]/90 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-[1600px] mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="p-1.5 bg-pink-500/10 rounded-lg">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" class="jam-accent">
                        <path d="M6 8C6 6.89543 6.89543 6 8 6H16C17.1046 6 18 6.89543 18 8V18C18 20.2091 16.2091 22 14 22H10C7.79086 22 6 20.2091 6 18V8Z" fill="currentColor" fill-opacity="0.2" stroke="currentColor" stroke-width="2.5"/>
                    </svg>
                </div>
                <span class="text-2xl font-black tracking-tighter italic uppercase">CRYPTO <span class="jam-accent">JAM</span></span>
            </div>
            <div class="flex items-center space-x-2 text-[11px] text-gray-500 font-bold tracking-widest">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse shadow-[0_0_8px_#22c55e]"></span>
                <span>REAL-TIME ENGINE LIVE</span>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-[1600px] mx-auto w-full px-4 py-6">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <!-- [1] Market List -->
            <div class="lg:col-span-2">
                <section class="bg-[#161b22] border border-gray-800 rounded-2xl overflow-hidden flex flex-col h-[calc(100vh-160px)] shadow-2xl">
                    <div class="flex border-b border-gray-800 bg-[#0d1117] p-1">
                        <button onclick="JamApp.switchMarket('L1L2')" id="mtab-L1L2" class="flex-1 py-2.5 text-[11px] font-black tab-active transition-all rounded-lg">L1/L2</button>
                        <button onclick="JamApp.switchMarket('DeFi')" id="mtab-DeFi" class="flex-1 py-2.5 text-[11px] font-black text-gray-500 hover:text-gray-300 transition-all">DeFi</button>
                        <button onclick="JamApp.switchMarket('Meme')" id="mtab-Meme" class="flex-1 py-2.5 text-[11px] font-black text-gray-500 hover:text-gray-300 transition-all">Meme</button>
                    </div>
                    <div class="p-3 border-b border-gray-800">
                        <input type="text" id="coin-filter" oninput="JamApp.renderMarketList()" placeholder="Quick Search..." class="w-full bg-[#0d1117] border border-gray-700 rounded-lg px-3 py-2 text-[12px] focus:outline-none focus:border-pink-500 transition-colors">
                    </div>
                    <div id="coin-list" class="flex-grow overflow-y-auto custom-scrollbar p-2"></div>
                </section>
            </div>

            <!-- [2] Chart & Portfolio -->
            <div class="lg:col-span-7 space-y-6">
                <!-- TradingView Chart -->
                <section class="bg-[#161b22] border border-gray-800 rounded-2xl overflow-hidden shadow-2xl">
                    <div class="p-4 border-b border-gray-800 flex justify-between items-center bg-[#0d1117]">
                        <div class="flex items-center space-x-3">
                            <div class="w-2 h-4 jam-bg rounded-full"></div>
                            <h2 id="current-symbol-title" class="font-black text-sm text-white tracking-tight">BINANCE:BTCUSDT</h2>
                        </div>
                        <span class="text-[10px] text-gray-500 font-bold uppercase tracking-[0.2em]">Global Market Terminal</span>
                    </div>
                    <div id="tv_chart_container" class="tv-chart-container"></div>
                </section>

                <!-- Portfolio Manager -->
                <section class="bg-[#161b22] border border-gray-800 rounded-2xl overflow-hidden shadow-2xl">
                    <div class="p-5 border-b border-gray-800 bg-[#0d1117] flex justify-between items-center">
                        <div class="flex items-center space-x-6">
                            <h3 class="font-black text-pink-500 text-xs uppercase tracking-widest">Portfolio Control</h3>
                            <div class="flex space-x-2" id="portfolio-tabs">
                                <button onclick="JamApp.switchSlot(0)" id="pslot-0" class="px-4 py-1.5 rounded-lg border border-gray-700 text-[10px] font-black bg-[#1c2128] hover:border-pink-500 transition-all">SLOT 1</button>
                                <button onclick="JamApp.switchSlot(1)" id="pslot-1" class="px-4 py-1.5 rounded-lg border border-gray-700 text-[10px] font-black bg-[#1c2128] opacity-50 hover:opacity-100 transition-all">SLOT 2</button>
                                <button onclick="JamApp.switchSlot(2)" id="pslot-2" class="px-4 py-1.5 rounded-lg border border-gray-700 text-[10px] font-black bg-[#1c2128] opacity-50 hover:opacity-100 transition-all">SLOT 3</button>
                            </div>
                        </div>
                        <div class="flex space-x-8">
                            <div class="text-right">
                                <p class="text-[9px] text-gray-500 uppercase font-bold mb-1">Total Value</p>
                                <p id="total-balance" class="text-xl font-black leading-none">$0</p>
                            </div>
                            <div class="text-right border-l border-gray-800 pl-8">
                                <p class="text-[9px] text-gray-500 uppercase font-bold mb-1">Net Profit</p>
                                <p id="total-profit-amt" class="text-xl font-black leading-none">$0</p>
                            </div>
                        </div>
                    </div>

                    <div class="p-5 grid grid-cols-1 md:grid-cols-4 gap-6">
                        <!-- Add Form -->
                        <div class="md:col-span-1 space-y-3 border-r border-gray-800 pr-6">
                            <p class="text-[10px] font-black text-gray-500 uppercase tracking-wider">Add Asset</p>
                            <select id="p-coin-select" class="w-full bg-[#0d1117] border border-gray-700 rounded-lg px-3 py-2.5 text-xs font-bold focus:outline-none focus:border-pink-500"></select>
                            <input type="number" id="p-buy-price" placeholder="Entry Price" class="w-full bg-[#0d1117] border border-gray-700 rounded-lg px-3 py-2.5 text-xs focus:outline-none focus:border-pink-500">
                            <input type="number" id="p-quantity" placeholder="Amount" class="w-full bg-[#0d1117] border border-gray-700 rounded-lg px-3 py-2.5 text-xs focus:outline-none focus:border-pink-500">
                            <button onclick="JamApp.addAsset()" class="w-full jam-bg hover:opacity-90 text-white py-3 rounded-lg text-xs font-black uppercase shadow-lg shadow-pink-500/20 transition-all active:scale-95">Deploy Capital</button>
                        </div>
                        <!-- Asset List -->
                        <div class="md:col-span-3">
                            <div id="portfolio-list" class="grid grid-cols-1 sm:grid-cols-2 gap-4 overflow-y-auto max-h-[280px] custom-scrollbar pr-2"></div>
                            <div id="empty-msg" class="text-center py-16 text-gray-600 text-xs font-bold italic uppercase tracking-widest">No Active Positions In This Slot</div>
                        </div>
                    </div>
                </section>
            </div>

            <!-- [3] News Insights -->
            <div class="lg:col-span-3">
                <section class="bg-[#161b22] border border-gray-800 rounded-2xl overflow-hidden flex flex-col h-[calc(100vh-160px)] shadow-2xl">
                    <div class="p-4 border-b border-gray-800 bg-[#0d1117] flex justify-between items-center">
                        <div class="flex items-center space-x-2">
                            <h3 id="news-title" class="font-black text-[11px] uppercase tracking-[0.15em] text-white">BTC INSIGHTS</h3>
                        </div>
                        <button onclick="JamApp.fetchNews()" class="px-3 py-1 bg-gray-800 hover:bg-gray-700 text-[9px] text-gray-300 font-black uppercase rounded transition-all">Refresh</button>
                    </div>
                    <div id="news-container" class="p-4 flex-grow overflow-y-auto custom-scrollbar space-y-4"></div>
                </section>
            </div>

        </div>
    </main>

    <footer class="border-t border-gray-800 py-6 bg-[#0d1117]">
        <div class="max-w-[1600px] mx-auto px-4 text-center text-gray-600 text-[10px] font-bold tracking-[0.3em] uppercase">
            &copy; 2026 CRYPTO <span class="text-pink-600">JAM</span> TERMINAL. POWERED BY TRADINGVIEW & COINGECKO.
        </div>
    </footer>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        /**
         * JAM APP - Core Logic Object
         */
        const JamApp = {
            // [Data] Coin Master List
            cryptoList: [
                { symbol: "BINANCE:BTCUSDT", name: "Bitcoin", sub: "BTC", id: "bitcoin", category: "L1L2" },
                { symbol: "BINANCE:ETHUSDT", name: "Ethereum", sub: "ETH", id: "ethereum", category: "L1L2" },
                { symbol: "BINANCE:SOLUSDT", name: "Solana", sub: "SOL", id: "solana", category: "L1L2" },
                { symbol: "BINANCE:BNBUSDT", name: "BNB", sub: "BNB", id: "binancecoin", category: "L1L2" },
                { symbol: "BINANCE:XRPUSDT", name: "XRP", sub: "XRP", id: "ripple", category: "L1L2" },
                { symbol: "BINANCE:ADAUSDT", name: "Cardano", sub: "ADA", id: "cardano", category: "L1L2" },
                { symbol: "BINANCE:LINKUSDT", name: "Chainlink", sub: "LINK", id: "chainlink", category: "DeFi" },
                { symbol: "BINANCE:UNIUSDT", name: "Uniswap", sub: "UNI", id: "uniswap", category: "DeFi" },
                { symbol: "BINANCE:AAVEUSDT", name: "Aave", sub: "AAVE", id: "aave", category: "DeFi" },
                { symbol: "BINANCE:DOGEUSDT", name: "Dogecoin", sub: "DOGE", id: "dogecoin", category: "Meme" },
                { symbol: "BINANCE:SHIBUSDT", name: "Shiba Inu", sub: "SHIB", id: "shiba-inu", category: "Meme" },
                { symbol: "BINANCE:PEPEUSDT", name: "Pepe", sub: "PEPE", id: "pepe", category: "Meme" },
                { symbol: "BINANCE:FLOKIUSDT", name: "Floki", sub: "FLOKI", id: "floki", category: "Meme" }
            ],

            // [State] App State
            state: {
                currentMarket: "L1L2",
                currentSlot: 0,
                activeSymbol: "BINANCE:BTCUSDT",
                portfolios: JSON.parse(localStorage.getItem('jam_data_v2')) || [[], [], []],
                prices: {},
                isInitialLoad: true,
                editingIndex: null 
            },

            // [Initialization]
            init() {
                this.renderMarketList();
                this.populateCoinSelect();
                this.changeChartSymbol(this.state.activeSymbol); 
                this.startPriceSync();
                console.log("💎 JAM Engine Started Successfully");
            },

            // [Utility] Numbers Formatting
            fmt(val, type = 'cur') {
                if (isNaN(val) || val === null) return '0.00';
                return type === 'cur' 
                    ? val.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })
                    : val.toFixed(2);
            },

            // [Chart Logic]
            changeChartSymbol(symbol) {
                if (!symbol) return;
                
                this.state.activeSymbol = symbol;
                document.getElementById('current-symbol-title').innerText = symbol;
                
                new TradingView.widget({
                    "autosize": true,
                    "symbol": symbol,
                    "interval": "D",
                    "timezone": "Asia/Seoul",
                    "theme": "dark",
                    "style": "1",
                    "locale": "ko",
                    "toolbar_bg": "#0d1117",
                    "enable_publishing": false,
                    "hide_side_toolbar": false,
                    "container_id": "tv_chart_container"
                });

                const coin = this.cryptoList.find(c => c.symbol === symbol);
                if (coin) this.fetchNews(coin.sub, coin.name);
                
                this.renderMarketList(); 
                this.renderPortfolio(); 
            },

            // [Market List Rendering]
            renderMarketList() {
                const container = document.getElementById('coin-list');
                const filter = document.getElementById('coin-filter').value.toLowerCase();
                container.innerHTML = '';

                this.cryptoList
                    .filter(c => c.category === this.state.currentMarket && 
                                (c.name.toLowerCase().includes(filter) || c.sub.toLowerCase().includes(filter)))
                    .forEach(coin => {
                        const isActive = coin.symbol === this.state.activeSymbol;
                        const div = document.createElement('div');
                        div.className = `flex items-center justify-between p-3 rounded-xl cursor-pointer transition-all group mb-1.5 active:scale-[0.98] 
                                        ${isActive ? 'bg-pink-500/10 border border-pink-500/30 shadow-[0_0_15px_rgba(255,0,122,0.1)]' : 'hover:bg-[#1c2128]'}`;
                        div.onclick = () => this.changeChartSymbol(coin.symbol);
                        div.innerHTML = `
                            <div class="flex items-center space-x-3">
                                <img src="https://assets.coincap.io/assets/icons/${coin.sub.toLowerCase()}@2x.png" 
                                     class="w-7 h-7 rounded-full border border-gray-700 bg-gray-800 p-0.5" onerror="this.src='https://via.placeholder.com/28/30363d/white?text=${coin.sub[0]}'">
                                <div class="flex flex-col">
                                    <span class="text-[12px] font-black ${isActive ? 'text-pink-500' : 'group-hover:text-pink-500'} transition-colors">${coin.sub}</span>
                                    <span class="text-[10px] text-gray-500 font-bold">${coin.name}</span>
                                </div>
                            </div>
                            <span class="text-[9px] ${isActive ? 'text-pink-500/50' : 'text-gray-700'} font-black uppercase tracking-tighter">BINANCE</span>
                        `;
                        container.appendChild(div);
                    });
            },

            // [Portfolio Rendering]
            renderPortfolio() {
                const container = document.getElementById('portfolio-list');
                const emptyMsg = document.getElementById('empty-msg');
                const slotData = this.state.portfolios[this.state.currentSlot];
                
                container.innerHTML = '';
                let totalVal = 0, totalCost = 0;

                if (slotData.length === 0) {
                    emptyMsg.classList.remove('hidden');
                } else {
                    emptyMsg.classList.add('hidden');
                    slotData.forEach((asset, idx) => {
                        const curPrice = this.state.prices[asset.id]?.usd || 0;
                        const isPriceValid = curPrice > 0;
                        
                        const val = curPrice * asset.quantity;
                        const cost = asset.buyPrice * asset.quantity;
                        const profit = val - cost;
                        const profitPct = cost > 0 ? (profit / cost) * 100 : 0;
                        
                        if (isPriceValid) {
                            totalVal += val;
                            totalCost += cost;
                        }

                        const symbolFormat = `BINANCE:${asset.sub}USDT`;
                        const isActive = symbolFormat === this.state.activeSymbol;
                        const isEditing = this.state.editingIndex === idx;
                        
                        const card = document.createElement('div');
                        card.className = `bg-[#0d1117] border border-gray-800 p-4 rounded-2xl flex flex-col transition-all cursor-pointer hover:border-gray-600 
                                        ${isActive ? 'card-active ring-1 ring-pink-500/50' : ''}`;
                        
                        if (!isEditing) {
                            const profitClass = isPriceValid ? (profit >= 0 ? 'profit-glow' : 'loss-glow') : 'text-gray-500';
                            const profitText = isPriceValid ? `${profit >= 0 ? '+$' : '-$'}${this.fmt(Math.abs(profit))}` : '---';
                            const pctText = isPriceValid ? `${profit >= 0 ? '+' : ''}${this.fmt(profitPct, 'num')}%` : '---';

                            card.onclick = () => this.changeChartSymbol(symbolFormat);
                            card.innerHTML = `
                                <div class="flex justify-between items-start mb-2">
                                    <div class="flex items-center space-x-2">
                                        <div class="w-1.5 h-1.5 jam-bg rounded-full"></div>
                                        <span class="text-[13px] font-black text-white uppercase tracking-tighter">${asset.sub}</span>
                                    </div>
                                    <div class="flex space-x-3">
                                        <button onclick="event.stopPropagation(); JamApp.startEdit(${idx})" class="text-[10px] text-gray-500 hover:text-pink-500 font-black transition-colors">EDIT</button>
                                        <button onclick="event.stopPropagation(); JamApp.removeAsset(${idx})" class="text-[10px] text-gray-600 hover:text-red-500 font-black transition-colors">✕</button>
                                    </div>
                                </div>
                                <div class="flex justify-between items-end">
                                    <div class="text-[10px] text-gray-500 font-bold space-y-0.5">
                                        <p>HOLD: <span class="text-gray-300">${this.fmt(asset.quantity, 'num')}</span></p>
                                        <p>VAL: <span class="text-gray-300">${isPriceValid ? '$' + this.fmt(val) : '---'}</span></p>
                                    </div>
                                    <div class="text-right">
                                        <p class="text-[11px] font-black leading-none ${profitClass} mb-1">
                                            ${profitText}
                                        </p>
                                        <p class="text-sm font-black ${profitClass}">
                                            ${pctText}
                                        </p>
                                    </div>
                                </div>
                            `;
                        } else {
                            card.innerHTML = `
                                <div class="flex justify-between items-start mb-3">
                                    <span class="text-[11px] font-black text-pink-500 uppercase tracking-widest">Adjust ${asset.sub}</span>
                                    <div class="flex space-x-3">
                                        <button onclick="event.stopPropagation(); JamApp.saveEdit(${idx})" class="text-[10px] text-green-500 font-black hover:text-green-400">SAVE</button>
                                        <button onclick="event.stopPropagation(); JamApp.cancelEdit()" class="text-[10px] text-gray-500 font-black hover:text-gray-400">ESC</button>
                                    </div>
                                </div>
                                <div class="grid grid-cols-2 gap-2">
                                    <div class="flex flex-col">
                                        <label class="text-[8px] text-gray-500 font-black uppercase mb-1">Price</label>
                                        <input type="number" id="edit-price-${idx}" value="${asset.buyPrice}" 
                                               class="w-full bg-[#1c2128] border border-gray-700 rounded-lg px-2 py-1.5 text-[11px] text-white focus:outline-none focus:border-pink-500">
                                    </div>
                                    <div class="flex flex-col">
                                        <label class="text-[8px] text-gray-500 font-black uppercase mb-1">Qty</label>
                                        <input type="number" id="edit-qty-${idx}" value="${asset.quantity}" 
                                               class="w-full bg-[#1c2128] border border-gray-700 rounded-lg px-2 py-1.5 text-[11px] text-white focus:outline-none focus:border-pink-500">
                                    </div>
                                </div>
                            `;
                        }
                        container.appendChild(card);
                    });
                }

                const totalProfitAmt = totalVal - totalCost;
                
                document.getElementById('total-balance').innerText = `$${this.fmt(totalVal)}`;
                
                const profitAmtEl = document.getElementById('total-profit-amt');
                profitAmtEl.innerText = `${totalProfitAmt >= 0 ? '+$' : '-$'}${this.fmt(Math.abs(totalProfitAmt))}`;
                profitAmtEl.className = `text-xl font-black ${totalProfitAmt >= 0 ? 'profit-glow' : 'loss-glow'}`;

                this.updateSlotUI();
            },

            // [Asset Management]
            startEdit(idx) {
                this.state.editingIndex = idx;
                this.renderPortfolio();
            },

            saveEdit(idx) {
                const newPrice = parseFloat(document.getElementById(`edit-price-${idx}`).value);
                const newQty = parseFloat(document.getElementById(`edit-qty-${idx}`).value);

                if (isNaN(newPrice) || isNaN(newQty) || newPrice < 0 || newQty < 0) return alert("Invalid inputs");

                this.state.portfolios[this.state.currentSlot][idx].buyPrice = newPrice;
                this.state.portfolios[this.state.currentSlot][idx].quantity = newQty;

                this.state.editingIndex = null;
                this.save();
                console.log("✅ Asset Updated");
            },

            cancelEdit() {
                this.state.editingIndex = null;
                this.renderPortfolio();
            },

            addAsset() {
                const coinData = document.getElementById('p-coin-select').value;
                const price = parseFloat(document.getElementById('p-buy-price').value);
                const qty = parseFloat(document.getElementById('p-quantity').value);

                if (!coinData || isNaN(price) || isNaN(qty)) return alert("Fill all fields");

                const info = JSON.parse(coinData);
                this.state.portfolios[this.state.currentSlot].push({ 
                    id: info.id, sub: info.sub, buyPrice: price, quantity: qty 
                });
                this.save();
                this.syncPrices();
                
                document.getElementById('p-buy-price').value = '';
                document.getElementById('p-quantity').value = '';
            },

            removeAsset(idx) {
                if (confirm("Remove this asset?")) {
                    this.state.portfolios[this.state.currentSlot].splice(idx, 1);
                    this.save();
                }
            },

            // [Data Sync]
            async syncPrices() {
                const ids = [...new Set(this.state.portfolios.flat().map(a => a.id))].join(',');
                if (!ids) {
                    this.renderPortfolio();
                    return;
                }

                try {
                    const res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd`);
                    if (!res.ok) throw new Error("API Error");
                    this.state.prices = await res.json();
                    this.renderPortfolio();
                } catch (e) {
                    console.warn("Price sync failed");
                }
            },

            startPriceSync() {
                this.syncPrices();
                setInterval(() => this.syncPrices(), 30000); 
            },

            // [UI Nav]
            switchMarket(tabId) {
                document.getElementById(`mtab-${this.state.currentMarket}`).classList.remove('tab-active');
                this.state.currentMarket = tabId;
                document.getElementById(`mtab-${tabId}`).classList.add('tab-active');
                this.renderMarketList();
            },

            switchSlot(slotIdx) {
                document.getElementById(`pslot-${this.state.currentSlot}`).classList.add('opacity-50');
                this.state.currentSlot = slotIdx;
                document.getElementById(`pslot-${slotIdx}`).classList.remove('opacity-50');
                this.renderPortfolio();
            },

            updateSlotUI() {
                this.state.portfolios.forEach((slot, idx) => {
                    const btn = document.getElementById(`pslot-${idx}`);
                    btn.classList.remove('border-green-500', 'border-red-500', 'border-pink-500');
                    if (slot.length > 0) {
                        let cost = 0, val = 0;
                        slot.forEach(a => {
                            cost += a.buyPrice * a.quantity;
                            val += (this.state.prices[a.id]?.usd || 0) * a.quantity;
                        });
                        btn.classList.add(val >= cost ? 'border-green-500' : 'border-red-500');
                    } else if (idx === this.state.currentSlot) {
                        btn.classList.add('border-pink-500');
                    }
                });
            },

            populateCoinSelect() {
                const select = document.getElementById('p-coin-select');
                select.innerHTML = '<option value="" disabled selected>Select Coin</option>';
                this.cryptoList.forEach(c => {
                    const opt = document.createElement('option');
                    opt.value = JSON.stringify({id: c.id, sub: c.sub});
                    opt.innerText = `${c.sub} - ${c.name}`;
                    select.appendChild(opt);
                });
            },

            async fetchNews(sub = "Global", fullName = "Crypto") {
                const container = document.getElementById('news-container');
                document.getElementById('news-title').innerText = `${sub} INSIGHTS`;
                container.innerHTML = `<div class="jam-loading text-center py-10 text-[10px] text-pink-500 font-black uppercase tracking-[0.2em]">Intercepting Data Stream...</div>`;

                setTimeout(() => {
                    container.innerHTML = '';
                    const mock = [
                        {t:`Significant volume spike detected for ${sub} on Binance.`, s:"Market Flow", time:"12m ago"},
                        {t:`Technical analysis indicates bullish consolidation for ${fullName}.`, s:"Chart Patterns", time:"45m ago"},
                        {t:`Institutional whales moving ${sub} off exchanges.`, s:"On-Chain", time:"2h ago"}
                    ];
                    mock.forEach(n => {
                        const div = document.createElement('div');
                        div.className = 'group bg-[#0d1117] border border-gray-800 p-4 rounded-xl hover:border-pink-500/50 transition-all cursor-default shadow-sm';
                        div.innerHTML = `
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-[9px] font-black text-pink-500 uppercase tracking-widest">${n.s}</span>
                                <span class="text-[8px] text-gray-600 font-bold uppercase">${n.time}</span>
                            </div>
                            <h4 class="text-[11px] font-bold leading-relaxed text-gray-200 group-hover:text-white transition-colors">${n.t}</h4>
                        `;
                        container.appendChild(div);
                    });
                }, 800);
            },

            save() {
                localStorage.setItem('jam_data_v2', JSON.stringify(this.state.portfolios));
                this.renderPortfolio();
            }
        };

        // Initialize App
        window.onload = () => JamApp.init();
    </script>

</body>
</html>
