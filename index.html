<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Jam | Real-time Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0d1117;
        }
        .tv-chart-container {
            height: 450px;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #0d1117;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 10px;
        }
        .tab-active {
            border-bottom: 2px solid #FF007A;
            color: #FF007A;
        }
        .portfolio-slot-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .profit-border { border-color: #FF007A !important; }
        .loss-border { border-color: #ef4444 !important; }
        .jam-accent { color: #FF007A; text-shadow: 0 0 15px rgba(255, 0, 122, 0.3); }
        .jam-bg { background-color: #FF007A; }
        
        /* 수익 시 네온 글로우 효과 */
        .profit-glow {
            color: #FF007A !important;
            text-shadow: 0 0 10px rgba(255, 0, 122, 0.8), 0 0 20px rgba(255, 0, 122, 0.4);
            font-weight: 800;
        }

        @keyframes jam-pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
        .jam-loading { animation: jam-pulse 1.5s infinite ease-in-out; }
    </style>
</head>
<body class="text-gray-100 flex flex-col min-h-screen">

    <!-- Top Ticker Tape -->
    <div class="w-full border-b border-gray-800">
        <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
            {
            "symbols": [
                {"proName": "BINANCE:BTCUSDT", "title": "BTC"},
                {"proName": "BINANCE:ETHUSDT", "title": "ETH"},
                {"proName": "BINANCE:SOLUSDT", "title": "SOL"},
                {"proName": "BINANCE:XRPUSDT", "title": "XRP"},
                {"proName": "BINANCE:DOGEUSDT", "title": "DOGE"}
            ],
            "showSymbolLogo": true,
            "colorTheme": "dark",
            "isTransparent": true,
            "displayMode": "adaptive",
            "locale": "ko"
            }
            </script>
        </div>
    </div>

    <!-- Header -->
    <header class="border-b border-gray-800 bg-[#0d1117]/90 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-[1600px] mx-auto px-4 h-14 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="jam-accent">
                    <path d="M6 8C6 6.89543 6.89543 6 8 6H16C17.1046 6 18 6.89543 18 8V18C18 20.2091 16.2091 22 14 22H10C7.79086 22 6 20.2091 6 18V8Z" fill="currentColor" fill-opacity="0.2" stroke="currentColor" stroke-width="2"/>
                    <path d="M7 3C7 2.44772 7.44772 2 8 2H16C16.5523 2 17 2.44772 17 3V5C17 5.55228 16.5523 6 16 6H8C7.44772 6 7 5.55228 7 5V3Z" stroke="currentColor" stroke-width="2"/>
                    <path d="M9 10C9 9.44772 9.44772 9 10 9H14C14.5523 9 15 10V12C15 12.5523 14.5523 13 14 13H10C9.44772 13 9 12.5523 9 12V10Z" fill="currentColor" fill-opacity="0.5"/>
                </svg>
                <span class="text-xl font-bold tracking-tighter text-gray-300 italic uppercase">CRYPTO <span class="jam-accent font-extrabold">JAM</span></span>
            </div>
            <div class="flex items-center space-x-6 text-xs font-medium text-gray-400">
                <div class="flex items-center space-x-1">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                    <span>Global Market Live</span>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-[1600px] mx-auto w-full px-4 py-4">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-4">
            
            <!-- [1] Left: Market List (2/12) -->
            <div class="lg:col-span-2 space-y-4">
                <section class="bg-[#161b22] border border-gray-800 rounded-xl overflow-hidden shadow-2xl flex flex-col h-[calc(100vh-140px)]">
                    <div class="flex border-b border-gray-800 bg-[#0d1117]">
                        <button onclick="switchMarketTab('L1L2')" id="mtab-L1L2" class="flex-1 py-3 text-[10px] font-semibold tab-active hover:bg-gray-800 transition-colors">L1/L2</button>
                        <button onclick="switchMarketTab('DeFi')" id="mtab-DeFi" class="flex-1 py-3 text-[10px] font-semibold text-gray-400 hover:bg-gray-800 transition-colors">DeFi</button>
                        <button onclick="switchMarketTab('Meme')" id="mtab-Meme" class="flex-1 py-3 text-[10px] font-semibold text-gray-400 hover:bg-gray-800 transition-colors">Meme</button>
                    </div>
                    <div class="p-2 border-b border-gray-800">
                        <input type="text" id="coin-filter" placeholder="Filter..." class="w-full bg-[#0d1117] border border-gray-700 rounded px-2 py-1 text-[11px] focus:outline-none focus:border-pink-500">
                    </div>
                    <div id="coin-list" class="flex-grow overflow-y-auto custom-scrollbar p-1">
                        <!-- JS populated -->
                    </div>
                </section>
            </div>

            <!-- [2] Center: Chart & Portfolio Management (7/12) -->
            <div class="lg:col-span-7 space-y-4">
                <!-- Chart Section -->
                <section class="bg-[#161b22] border border-gray-800 rounded-xl overflow-hidden shadow-2xl flex flex-col">
                    <div class="p-3 border-b border-gray-800 flex justify-between items-center bg-[#0d1117]">
                        <h2 id="current-symbol-title" class="font-semibold text-sm flex items-center tracking-tight text-pink-500">
                            BINANCE:BTCUSDT
                        </h2>
                        <div class="text-[10px] text-gray-500 uppercase tracking-widest font-bold">
                            LIVE CHART
                        </div>
                    </div>
                    <div id="tv_chart_container" class="tv-chart-container w-full"></div>
                </section>

                <!-- Portfolio Management (Expanded) -->
                <section class="bg-[#161b22] border border-gray-800 rounded-xl overflow-hidden shadow-2xl">
                    <div class="p-4 border-b border-gray-800 bg-[#0d1117] flex justify-between items-center">
                        <div class="flex items-center space-x-4">
                            <h3 class="font-bold text-pink-500 uppercase tracking-wider text-xs">Portfolio Manager</h3>
                            <div class="flex space-x-1" id="portfolio-tabs">
                                <button onclick="switchPortfolio(0)" id="pslot-0" class="portfolio-slot-btn px-3 py-1 rounded border border-gray-700 text-[10px] font-bold bg-[#1c2128]">Slot 1</button>
                                <button onclick="switchPortfolio(1)" id="pslot-1" class="portfolio-slot-btn px-3 py-1 rounded border border-gray-700 text-[10px] font-bold bg-[#1c2128] opacity-50">Slot 2</button>
                                <button onclick="switchPortfolio(2)" id="pslot-2" class="portfolio-slot-btn px-3 py-1 rounded border border-gray-700 text-[10px] font-bold bg-[#1c2128] opacity-50">Slot 3</button>
                            </div>
                        </div>
                        <div class="flex space-x-6">
                            <div class="text-right">
                                <p class="text-[9px] text-gray-500 uppercase">Total Balance</p>
                                <p id="total-balance" class="text-lg font-extrabold text-white leading-none">$0</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[9px] text-gray-500 uppercase">Total ROI</p>
                                <p id="total-profit" class="text-lg font-extrabold leading-none">0%</p>
                            </div>
                        </div>
                    </div>

                    <div class="p-4 grid grid-cols-1 md:grid-cols-4 gap-4">
                        <!-- Add Asset Form (Left) -->
                        <div class="md:col-span-1 space-y-2 border-r border-gray-800 pr-4">
                            <p class="text-[10px] font-bold text-gray-400 uppercase mb-2">Add New Asset</p>
                            <select id="p-coin-select" class="w-full bg-[#0d1117] border border-gray-700 rounded px-2 py-2 text-xs focus:outline-none focus:border-pink-500"></select>
                            <input type="number" id="p-buy-price" placeholder="Entry Price" class="w-full bg-[#0d1117] border border-gray-700 rounded px-2 py-2 text-xs focus:outline-none focus:border-pink-500">
                            <input type="number" id="p-quantity" placeholder="Amount" class="w-full bg-[#0d1117] border border-gray-700 rounded px-2 py-2 text-xs focus:outline-none focus:border-pink-500">
                            <button onclick="addAsset()" class="w-full bg-pink-600 hover:bg-pink-700 text-white font-extrabold py-2 rounded text-[11px] transition-all uppercase tracking-tighter">Add to Portfolio</button>
                        </div>

                        <!-- Asset List (Right) -->
                        <div class="md:col-span-3">
                            <div id="portfolio-list-full" class="grid grid-cols-1 sm:grid-cols-2 gap-3 overflow-y-auto max-h-[250px] custom-scrollbar pr-2">
                                <!-- JS populated -->
                            </div>
                            <div id="empty-msg" class="text-center py-10 text-gray-600 text-xs italic">No assets in this slot. Start adding!</div>
                        </div>
                    </div>
                </section>
            </div>

            <!-- [3] Right: News & Indicators (3/12) -->
            <div class="lg:col-span-3 space-y-4">
                <section class="bg-[#161b22] border border-gray-800 rounded-xl overflow-hidden shadow-2xl flex flex-col h-[calc(100vh-140px)]">
                    <div class="p-3 border-b border-gray-800 bg-[#0d1117] flex justify-between items-center">
                        <div class="flex items-center space-x-2">
                            <span class="w-1.5 h-4 jam-bg rounded-full"></span>
                            <h3 id="news-title" class="font-bold text-[11px] uppercase tracking-wider">Market Insights</h3>
                        </div>
                        <button onclick="updateNews('all')" class="text-[9px] text-gray-500 hover:text-pink-500 transition-colors uppercase font-bold">Refresh</button>
                    </div>
                    <div id="news-container" class="p-3 flex-grow overflow-y-auto custom-scrollbar space-y-3">
                        <!-- News items -->
                    </div>
                </section>
            </div>

        </div>
    </main>

    <footer class="border-t border-gray-800 py-4">
        <div class="max-w-[1600px] mx-auto px-4 text-center text-gray-500 text-[10px]">
            <p>&copy; 2026 CRYPTO JAM. ALL ASSETS LOCALLY STORED. DATA BY COINGECKO & TRADINGVIEW.</p>
        </div>
    </footer>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        const coinData = {
            "L1L2": [
                { symbol: "BINANCE:BTCUSDT", name: "Bitcoin", sub: "BTC", id: "bitcoin" },
                { symbol: "BINANCE:ETHUSDT", name: "Ethereum", sub: "ETH", id: "ethereum" },
                { symbol: "BINANCE:SOLUSDT", name: "Solana", sub: "SOL", id: "solana" },
                { symbol: "BINANCE:ADAUSDT", name: "Cardano", sub: "ADA", id: "cardano" },
                { symbol: "BINANCE:MATICUSDT", name: "Polygon", sub: "MATIC", id: "polygon-ecosystem" }
            ],
            "DeFi": [
                { symbol: "BINANCE:UNIUSDT", name: "Uniswap", sub: "UNI", id: "uniswap" },
                { symbol: "BINANCE:AAVEUSDT", name: "Aave", sub: "AAVE", id: "aave" },
                { symbol: "BINANCE:LINKUSDT", name: "Chainlink", sub: "LINK", id: "chainlink" },
                { symbol: "BINANCE:CAKEUSDT", name: "PancakeSwap", sub: "CAKE", id: "pancakeswap-token" }
            ],
            "Meme": [
                { symbol: "BINANCE:DOGEUSDT", name: "Dogecoin", sub: "DOGE", id: "dogecoin" },
                { symbol: "BINANCE:SHIBUSDT", name: "Shiba Inu", sub: "SHIB", id: "shiba-inu" },
                { symbol: "BINANCE:PEPEUSDT", name: "Pepe", sub: "PEPE", id: "pepe" },
                { symbol: "BINANCE:FLOKIUSDT", name: "Floki", sub: "FLOKI", id: "floki" }
            ]
        };

        let currentMarketTab = "L1L2";
        let currentPortfolioSlot = 0;
        let portfolios = JSON.parse(localStorage.getItem('cv_portfolios')) || [[], [], []];
        let currentPrices = {};
        let editingIndex = -1;

        function updateDashboard(coin) {
            initChart(coin.symbol);
            updateNews(coin.sub, coin.name);
        }

        function initChart(symbol) {
            document.getElementById('current-symbol-title').innerText = symbol;
            new TradingView.widget({
                "autosize": true,
                "symbol": symbol,
                "interval": "D",
                "timezone": "Asia/Seoul",
                "theme": "dark",
                "style": "1",
                "locale": "ko",
                "toolbar_bg": "#0d1117",
                "enable_publishing": false,
                "container_id": "tv_chart_container",
                "market": "crypto"
            });
        }

        async function updateNews(symbol = "all", fullName = "Global") {
            const container = document.getElementById('news-container');
            const title = document.getElementById('news-title');
            title.innerText = symbol === "all" ? "Global Market" : `${fullName}`;
            
            container.innerHTML = `<div class="jam-loading text-center py-10 text-[10px] text-pink-500 font-bold uppercase tracking-widest">Scanning JAM...</div>`;

            setTimeout(() => {
                const mockNews = [
                    { title: `${symbol !== "all" ? symbol : "Crypto"} Market shows strong momentum`, source: "COINDESK", time: "2h" },
                    { title: `Whale Alert: Large volume moved to cold storage`, source: "BLOCK", time: "4h" },
                    { title: `Regulatory updates in Asia market`, source: "BLOOMBERG", time: "5h" }
                ];

                container.innerHTML = "";
                mockNews.forEach(news => {
                    const div = document.createElement("div");
                    div.className = "group bg-[#0d1117] border border-gray-800 p-3 rounded-lg hover:border-pink-500 transition-all cursor-pointer";
                    div.innerHTML = `
                        <div class="flex justify-between items-start mb-1">
                            <span class="text-[8px] font-bold text-pink-500 uppercase">${news.source}</span>
                            <span class="text-[8px] text-gray-600">${news.time}</span>
                        </div>
                        <h4 class="text-[10px] font-medium leading-tight group-hover:text-white transition-colors">${news.title}</h4>
                    `;
                    container.appendChild(div);
                });
            }, 600);
        }

        function renderMarketList() {
            const listContainer = document.getElementById('coin-list');
            const filter = document.getElementById('coin-filter').value.toLowerCase();
            listContainer.innerHTML = '';

            coinData[currentMarketTab].forEach(coin => {
                if (coin.name.toLowerCase().includes(filter) || coin.sub.toLowerCase().includes(filter)) {
                    const item = document.createElement('div');
                    item.className = 'flex items-center justify-between p-2 hover:bg-gray-800 rounded-lg cursor-pointer transition-colors group mb-1';
                    item.onclick = () => updateDashboard(coin);
                    
                    item.innerHTML = `
                        <div class="flex items-center space-x-2">
                            <div class="w-5 h-5 rounded-full bg-gray-700 flex items-center justify-center text-[9px] font-bold text-gray-300 uppercase">${coin.sub[0]}</div>
                            <div class="flex flex-col">
                                <span class="text-[11px] font-bold leading-tight group-hover:text-pink-500">${coin.sub}</span>
                                <span class="text-[9px] text-gray-500 leading-tight">${coin.name}</span>
                            </div>
                        </div>
                        <div class="text-[8px] text-gray-600 font-bold uppercase">BINANCE</div>
                    `;
                    listContainer.appendChild(item);
                }
            });
        }

        function populateCoinSelect() {
            const select = document.getElementById('p-coin-select');
            select.innerHTML = '<option value="" disabled selected>Select Coin</option>';
            Object.values(coinData).flat().forEach(coin => {
                const opt = document.createElement('option');
                opt.value = JSON.stringify({id: coin.id, sub: coin.sub});
                opt.innerText = `${coin.sub} (${coin.name})`;
                select.appendChild(opt);
            });
        }

        async function fetchPrices() {
            const ids = [...new Set(portfolios.flat().map(a => a.id))].join(',');
            if (!ids) return renderPortfolio();
            try {
                const res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd`);
                currentPrices = await res.json();
                renderPortfolio();
            } catch (e) { console.error("Price fetch failed", e); }
        }

        function addAsset() {
            const coinSelect = document.getElementById('p-coin-select').value;
            const buyPrice = parseFloat(document.getElementById('p-buy-price').value);
            const quantity = parseFloat(document.getElementById('p-quantity').value);

            if(!coinSelect || isNaN(buyPrice) || isNaN(quantity)) return alert("Please fill all fields correctly.");
            
            const coinInfo = JSON.parse(coinSelect);
            portfolios[currentPortfolioSlot].push({
                id: coinInfo.id,
                sub: coinInfo.sub,
                buyPrice,
                quantity
            });

            saveAndRender();
            fetchPrices();
            document.getElementById('p-buy-price').value = '';
            document.getElementById('p-quantity').value = '';
        }

        function removeAsset(index) {
            if(confirm("Delete this asset?")) {
                portfolios[currentPortfolioSlot].splice(index, 1);
                saveAndRender();
            }
        }

        function toggleEdit(index) {
            editingIndex = (editingIndex === index) ? -1 : index;
            renderPortfolio();
        }

        function saveEdit(index) {
            const newPrice = parseFloat(document.getElementById(`edit-price-${index}`).value);
            const newQty = parseFloat(document.getElementById(`edit-qty-${index}`).value);
            
            if(isNaN(newPrice) || isNaN(newQty)) return alert("Invalid values.");
            
            portfolios[currentPortfolioSlot][index].buyPrice = newPrice;
            portfolios[currentPortfolioSlot][index].quantity = newQty;
            
            editingIndex = -1;
            saveAndRender();
        }

        function saveAndRender() {
            localStorage.setItem('cv_portfolios', JSON.stringify(portfolios));
            renderPortfolio();
        }

        function renderPortfolio() {
            const listFull = document.getElementById('portfolio-list-full');
            const emptyMsg = document.getElementById('empty-msg');
            listFull.innerHTML = '';
            
            let totalValue = 0, totalCost = 0;
            const currentSlot = portfolios[currentPortfolioSlot];
            
            if (currentSlot.length === 0) {
                emptyMsg.classList.remove('hidden');
            } else {
                emptyMsg.classList.add('hidden');
                currentSlot.forEach((asset, idx) => {
                    const currentPrice = currentPrices[asset.id]?.usd || 0;
                    const currentValue = currentPrice * asset.quantity;
                    const cost = asset.buyPrice * asset.quantity;
                    const profit = currentValue - cost;
                    const profitPct = cost > 0 ? (profit / cost) * 100 : 0;
                    totalValue += currentValue;
                    totalCost += cost;

                    const isEditing = editingIndex === idx;
                    const div = document.createElement('div');
                    div.className = `bg-[#0d1117] border border-gray-800 p-3 rounded-xl flex flex-col transition-all ${profit >= 0 ? 'hover:border-pink-500' : 'hover:border-red-500'}`;
                    
                    if (isEditing) {
                        div.innerHTML = `
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-xs font-black text-pink-500 uppercase">${asset.sub} EDITING</span>
                            </div>
                            <div class="space-y-2">
                                <input type="number" id="edit-price-${idx}" value="${asset.buyPrice}" class="w-full bg-[#161b22] border border-gray-700 rounded px-2 py-1 text-[10px]">
                                <input type="number" id="edit-qty-${idx}" value="${asset.quantity}" class="w-full bg-[#161b22] border border-gray-700 rounded px-2 py-1 text-[10px]">
                                <div class="flex space-x-1">
                                    <button onclick="saveEdit(${idx})" class="flex-1 bg-green-600 py-1 rounded text-[9px] font-bold">SAVE</button>
                                    <button onclick="toggleEdit(-1)" class="flex-1 bg-gray-700 py-1 rounded text-[9px] font-bold">CANCEL</button>
                                </div>
                            </div>
                        `;
                    } else {
                        div.innerHTML = `
                            <div class="flex justify-between items-start mb-1">
                                <span class="text-xs font-black text-white uppercase tracking-tighter">${asset.sub}</span>
                                <div class="flex space-x-2">
                                    <button onclick="toggleEdit(${idx})" class="text-[9px] text-gray-500 hover:text-white uppercase font-bold">Edit</button>
                                    <button onclick="removeAsset(${idx})" class="text-[9px] text-gray-500 hover:text-red-500 uppercase font-bold">✕</button>
                                </div>
                            </div>
                            <div class="flex justify-between items-end">
                                <div>
                                    <p class="text-[8px] text-gray-500">Value: $${currentValue.toLocaleString(undefined, {maximumFractionDigits:2})}</p>
                                    <p class="text-[8px] text-gray-500">Entry: $${asset.buyPrice}</p>
                                </div>
                                <div class="text-right">
                                    <p class="text-sm font-black ${profit >= 0 ? 'profit-glow' : 'text-red-500'}">${profitPct >= 0 ? '+' : ''}${profitPct.toFixed(2)}%</p>
                                </div>
                            </div>
                        `;
                    }
                    listFull.appendChild(div);
                });
            }

            const totalProfit = totalValue - totalCost;
            const totalProfitPct = totalCost > 0 ? (totalProfit / totalCost) * 100 : 0;
            document.getElementById('total-balance').innerText = `$${totalValue.toLocaleString(undefined, {maximumFractionDigits:0})}`;
            
            const tpElement = document.getElementById('total-profit');
            tpElement.innerText = `${totalProfitPct >= 0 ? '+' : ''}${totalProfitPct.toFixed(2)}%`;
            tpElement.className = `text-lg font-extrabold ${totalProfit >= 0 ? 'profit-glow' : 'text-red-500'}`;
            
            updateSlotBorders();
        }

        function switchPortfolio(slot) {
            document.getElementById(`pslot-${currentPortfolioSlot}`).classList.add('opacity-50');
            currentPortfolioSlot = slot;
            document.getElementById(`pslot-${currentPortfolioSlot}`).classList.remove('opacity-50');
            editingIndex = -1;
            renderPortfolio();
        }

        function updateSlotBorders() {
            portfolios.forEach((slot, idx) => {
                let cost = 0, val = 0;
                slot.forEach(a => {
                    cost += a.buyPrice * a.quantity;
                    val += (currentPrices[a.id]?.usd || 0) * a.quantity;
                });
                const btn = document.getElementById(`pslot-${idx}`);
                btn.classList.remove('profit-border', 'loss-border');
                if (slot.length > 0) {
                    if (val >= cost) btn.classList.add('profit-border');
                    else btn.classList.add('loss-border');
                }
            });
        }

        function switchMarketTab(tabId) {
            document.getElementById(`mtab-${currentMarketTab}`).classList.remove('tab-active');
            currentMarketTab = tabId;
            document.getElementById(`mtab-${currentMarketTab}`).classList.add('tab-active');
            renderMarketList();
        }

        document.getElementById('coin-filter').addEventListener('input', renderMarketList);

        window.onload = () => {
            updateDashboard({ symbol: "BINANCE:BTCUSDT", sub: "BTC", name: "Bitcoin" });
            renderMarketList();
            populateCoinSelect();
            fetchPrices();
            setInterval(fetchPrices, 30000);
        };
    </script>
</body>
</html>
